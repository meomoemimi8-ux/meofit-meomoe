<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#3fa34d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="MèoFit" />
<title>MèoFit 🐾 — Lịch tập tại nhà</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
<style>
  :root{
    /* màu nhận diện vũ trụ Mèo Lực Sĩ — giữ nguyên qua mọi theme */
    --green:#3fa34d; --green-d:#2f7d3a; --green-l:#7bd389;
    --red:#ff6b6b; --blue:#4dabf7; --yellow:#ffd43b; --purple:#b197fc; --pink:#ff8fb1; --orange:#ffa94d; --teal:#38d9c9;
    /* tokens theo hệ Meomoe — LIGHT */
    --bg:#f4fbf2; --bg-1:#e7f9e4; --bg-2:#fff3f6;
    --card:#ffffff; --surface-2:#f3f8f1; --border:#e3efe2;
    --ink:#2b3a2e; --muted:#789078;
    --shadow:0 8px 22px rgba(63,163,77,.14);
    --r:22px; font-size:16px;
    --paw:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='34'%20height='34'%20viewBox='0%200%2034%2034'%3E%3Cg%20transform='rotate(-25%2017%2017)'%20stroke='%23d65b86'%20stroke-width='1.5'%20stroke-linejoin='round'%3E%3Crect%20x='11'%20y='14.5'%20width='12'%20height='5'%20rx='2.5'%20fill='%23ff8fb1'/%3E%3Crect%20x='6'%20y='11'%20width='5'%20height='12'%20rx='2.5'%20fill='%23ffb3c9'/%3E%3Crect%20x='23'%20y='11'%20width='5'%20height='12'%20rx='2.5'%20fill='%23ffb3c9'/%3E%3Crect%20x='2.5'%20y='9'%20width='4.5'%20height='16'%20rx='2'%20fill='%23ff8fb1'/%3E%3Crect%20x='27'%20y='9'%20width='4.5'%20height='16'%20rx='2'%20fill='%23ff8fb1'/%3E%3C/g%3E%3C/svg%3E") 17 17;
  }
  [data-theme='dark']{
    --bg:#16201a; --bg-1:#1d2a22; --bg-2:#241d2f;
    --card:#1f2b24; --surface-2:#26332b; --border:rgba(255,255,255,.10);
    --ink:#e9f5ea; --muted:#9db4a2; --green-l:#8fe09b;
    --shadow:0 8px 22px rgba(0,0,0,.45);
  }
  [data-theme='sakura']{
    --bg:#fff0f5; --bg-1:#ffd8e8; --bg-2:#ffe5f0;
    --card:#fffafc; --surface-2:#fff2f7; --border:#ffd9e6;
    --ink:#5a3a48; --muted:#a96f88;
    --shadow:0 10px 26px rgba(255,127,163,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 8%, var(--bg-1) 0, transparent 40%),
      radial-gradient(circle at 88% 4%, var(--bg-2) 0, transparent 35%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:84px;
    overflow-x:hidden;
    transition:background .5s,color .5s;
    cursor:var(--paw),auto;
  }
  a,button{cursor:var(--paw),pointer}
  .flowers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .flowers span{position:absolute;font-size:20px;opacity:.5;animation:float 9s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(12deg)}}

  .app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:14px 14px 0}

  header.top{position:relative;display:flex;align-items:center;gap:10px;justify-content:center;padding:8px 4px 14px}
  header.top .logo{font-size:30px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12))}
  .theme-btn{position:absolute;right:2px;top:8px;border:none;background:var(--card);box-shadow:var(--shadow);width:40px;height:40px;border-radius:50%;font-size:1.15rem;cursor:pointer;transition:transform .18s}
  .theme-btn:active{transform:scale(.9) rotate(-12deg)}
  header.top h1{font-size:1.45rem;margin:0;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--green-d),var(--green-l),var(--purple));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}

  .hero{background:linear-gradient(135deg,var(--green) 0%,var(--green-l) 100%);color:#fff;border-radius:26px;padding:20px;box-shadow:0 12px 26px rgba(63,163,77,.35);position:relative;overflow:hidden;margin-bottom:14px}
  .hero::after{content:none}
  .hero .day{font-size:.95rem;opacity:.92;font-weight:600}
  .hero .title{font-size:1.55rem;font-weight:800;margin:4px 0 2px}
  .hero .sub{font-size:.92rem;opacity:.95}
  .hero .extra{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:700;backdrop-filter:blur(4px)}

  .stats{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border-radius:18px;padding:12px;text-align:center;box-shadow:var(--shadow)}
  .stat .num{font-size:1.5rem;font-weight:800;color:var(--green-d)}
  .stat .lbl{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:2px}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:18px;padding:16px;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 8px 18px rgba(47,125,58,.35);cursor:pointer;transition:transform .08s;font-family:inherit}
  .btn:active{transform:scale(.97)}
  .btn.sec{background:var(--card);color:var(--green-d);border:2px solid var(--green-l);box-shadow:none}
  .btn.rest-day{background:linear-gradient(135deg,#b197fc,#9775fa);box-shadow:0 8px 18px rgba(151,117,250,.35)}

  h2.sec-title{font-size:1.05rem;margin:6px 4px 10px;font-weight:800;display:flex;align-items:center;gap:7px}

  /* level selector */
  .levels{margin-bottom:14px}
  .levels .lab{font-size:.78rem;color:var(--muted);font-weight:700;margin:0 4px 6px}
  .seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:16px}
  .seg button{flex:1;border:none;background:none;padding:9px 4px;border-radius:12px;font-weight:800;color:var(--muted);font-family:inherit;font-size:.8rem;cursor:pointer;line-height:1.15}
  .seg button small{display:block;font-size:.62rem;font-weight:600;opacity:.85;margin-top:2px}
  .seg button.on{background:var(--card);color:var(--green-d);box-shadow:var(--shadow)}

  .week-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:16px;margin-bottom:8px;background:var(--card);box-shadow:var(--shadow)}
  .week-row.today{outline:3px solid var(--green-l);background:var(--surface-2)}
  .week-row .dow{width:46px;font-weight:800;color:var(--green-d);font-size:.92rem;flex:none;text-align:center}
  .week-row .body{flex:1}
  .week-row .body .nm{font-weight:700;font-size:.96rem}
  .week-row .body .tg{font-size:.76rem;color:var(--muted)}
  .week-row .dot{width:10px;height:10px;border-radius:50%;flex:none}

  .sess-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:20px;margin-bottom:12px;color:#fff;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s}
  .sess-card:active{transform:scale(.98)}
  .sess-card .ic{font-size:30px}
  .sess-card .info{flex:1}
  .sess-card .info .t{font-weight:800;font-size:1.12rem}
  .sess-card .info .s{font-size:.8rem;opacity:.92}
  .sess-card .arrow{font-size:1.4rem;opacity:.9}
  .sess-card .badge-done{background:rgba(255,255,255,.3);border-radius:14px;padding:3px 9px;font-size:.72rem;font-weight:700}

  .ex{background:var(--card);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:6px solid var(--green-l)}
  .ex .row1{display:flex;align-items:flex-start;gap:10px}
  .ex .idx{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex:none}
  .ex .nm{font-weight:800;font-size:1.02rem;line-height:1.25}
  .ex .meta{font-size:.82rem;color:var(--green-d);font-weight:700;margin-top:2px}
  .tag{display:inline-block;padding:3px 9px;border-radius:12px;font-size:.72rem;font-weight:800;color:#fff;margin-top:7px}
  .ex .muscle{display:flex;gap:11px;align-items:center;font-size:.82rem;color:var(--ink);margin-top:9px;line-height:1.45;background:var(--surface-2);padding:9px 11px;border-radius:12px}
  .ex .muscle b{color:var(--green-d)}
  .ex .muscle .m-txt{flex:1}
  .bodymap{flex:none;width:74px;text-align:center}
  .bodymap .m-img{width:74px;height:92px;object-fit:contain;border-radius:12px;background:#fbfdfa;border:1px solid var(--border);display:block}
  .bodymap .m-img.gif{background:#f4f9f2}
  .bodymap .bm-lbl{font-size:.57rem;color:var(--muted);font-weight:700;margin-top:3px;line-height:1.2}
  .ex .gym{font-size:.82rem;color:var(--muted);margin-top:8px;line-height:1.45;background:var(--surface-2);padding:9px 11px;border-radius:12px;border-left:4px solid var(--yellow)}
  .ex .gym b{color:var(--ink)}
  .ex .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .ex .links a{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;font-weight:800;text-decoration:none;padding:5px 10px;border-radius:20px;background:var(--surface-2);color:var(--green-d)}
  .ex .links a.vid{background:rgba(255,107,107,.16);color:var(--red)}

  nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;background:var(--card);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto}
  nav.tabbar button{background:none;border:none;flex:1;padding:7px 2px;cursor:pointer;color:var(--muted);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;font-weight:700;transition:color .15s}
  nav.tabbar button .i{font-size:1.35rem;transition:transform .15s}
  nav.tabbar button.active{color:var(--green-d)}
  nav.tabbar button.active .i{transform:translateY(-2px) scale(1.12)}

  .player{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,var(--bg-1),var(--bg));display:none;flex-direction:column;padding:18px;padding-top:calc(18px + env(safe-area-inset-top))}
  .player.show{display:flex}
  .player .pbar{height:8px;border-radius:8px;background:var(--surface-2);overflow:hidden;margin-bottom:10px}
  .player .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green-l),var(--green));transition:width .3s}
  .player .phead{display:flex;justify-content:space-between;align-items:center;font-weight:800;color:var(--green-d);margin-bottom:10px}
  .player .phead .x{background:var(--card);border:none;width:38px;height:38px;border-radius:50%;font-size:1.1rem;box-shadow:var(--shadow);cursor:pointer;color:var(--ink)}
  .player .phead{gap:8px}
  .player #p-session{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .player .phead-btns{display:flex;gap:6px;align-items:center;flex:none}
  .player .picon{background:var(--card);border:none;width:36px;height:36px;border-radius:50%;font-size:1rem;box-shadow:var(--shadow);cursor:pointer}
  .player .picon.off{opacity:.4}
  /* thẻ hướng dẫn trong player (không mất tiến trình) */
  .guide-sheet{position:absolute;inset:0;z-index:10;background:rgba(0,0,0,.4);display:none;align-items:flex-end}
  .guide-sheet.show{display:flex;animation:fade .2s}
  .guide-card{background:var(--bg);width:100%;max-height:90%;overflow-y:auto;border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.25);animation:sheetUp .25s}
  @keyframes sheetUp{from{transform:translateY(50px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .guide-card .guide-h{font-weight:800;font-size:1.2rem;line-height:1.25;margin-bottom:8px}
  .guide-card .g-meta{font-size:.85rem;color:var(--green-d);font-weight:700;margin:9px 0 4px}
  .guide-card .btn{margin-top:14px}
  .guide-card .demo-img{width:100%;height:auto;max-height:320px;object-fit:contain;border-radius:14px;background:#f1f3f0;display:block}
  .guide-card .demo-cap{font-size:.72rem;color:var(--muted);font-weight:700;text-align:center;margin:5px 0 10px}

  /* form hồ sơ */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin:0 2px 5px}
  .field input,.field select{width:100%;border:2px solid var(--border);border-radius:14px;padding:11px 13px;font-size:1rem;font-family:inherit;background:var(--card);color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--green-l)}
  .frow{display:flex;gap:10px}.frow .field{flex:1;min-width:0}
  .field input,.field select{box-sizing:border-box}
  .metric{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:center}
  .metric .big{font-size:2rem;font-weight:800;color:var(--green-d);line-height:1.1}
  .bmi-badge{display:inline-block;padding:3px 12px;border-radius:20px;color:#fff;font-weight:800;font-size:.8rem;margin-top:5px}
  .food-chips{display:flex;flex-wrap:wrap;gap:6px}
  .food-chip{border:2px solid var(--border);background:var(--card);border-radius:14px;padding:7px 10px;font-size:.76rem;font-weight:700;font-family:inherit;color:var(--green-d);cursor:pointer}
  .food-chip:active{transform:scale(.95)}
  .food-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);font-size:.86rem}
  .food-row span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .food-row b{color:var(--green-d)}
  .food-row button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:.95rem;flex:none}
  .player .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .player .phase-lbl{font-size:1rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .player .ex-name{font-size:1.55rem;font-weight:800;line-height:1.2;margin-bottom:6px;padding:0 6px}
  .player .ex-tag{margin-bottom:10px}
  .ring{position:relative;width:230px;height:230px;margin:4px 0 12px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num .big{font-size:3.4rem;font-weight:800;color:var(--green-d);line-height:1}
  .ring .num .small{font-size:.95rem;color:var(--muted);font-weight:700;margin-top:4px}
  .player .setinfo{font-size:1.05rem;font-weight:800;color:var(--ink);margin-bottom:3px}
  .player .target{font-size:.92rem;color:var(--green-d);font-weight:700;margin-bottom:2px}
  .player .tempo{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:8px}
  .player .nextup{font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:12px;min-height:1.1em}
  .player .controls{display:flex;gap:10px;margin-top:6px;width:100%;max-width:360px}
  .player .controls .btn{padding:14px}
  .done-screen{text-align:center}
  .done-screen .big-emoji{font-size:80px;animation:pop .5s}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}

  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-weight:600}
  .hist-item{display:flex;align-items:center;gap:10px;padding:11px;background:var(--card);border-radius:14px;margin-bottom:8px;box-shadow:var(--shadow)}
  .hist-item .e{font-size:1.4rem}
  .hist-item .d{flex:1}
  .hist-item .d .n{font-weight:700;font-size:.92rem}
  .hist-item .d .t{font-size:.74rem;color:var(--muted)}

  .note-box{background:#fff8e6;border-radius:16px;padding:14px;font-size:.84rem;line-height:1.5;color:#7a6a2e;border-left:5px solid var(--yellow);margin-bottom:14px}
  .note-box.rope{background:#eef4ff;color:#3a4a6a;border-left-color:var(--blue)}
  .note-box.lock{background:#fdeef4;color:#7a3a55;border-left-color:var(--pink)}

  .view{display:none;animation:fade .25s}
  .view.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  a.vidlink{display:inline-flex;align-items:center;gap:6px;color:var(--red);font-weight:800;text-decoration:none;font-size:.9rem;margin-top:4px}

  /* mèo mascot Mèo Lực Sĩ */
  header.top .mascot{width:48px;height:48px;flex:none;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12))}
  .catface{width:100%;height:100%;display:block}

  /* footer đồng bộ Meomoe Multiverse */
  .footer{position:relative;text-align:center;padding:2.6rem 1.2rem 2.1rem;margin:20px -14px 0;background:var(--surface-2);color:var(--ink);border-radius:28px 28px 0 0}
  .footer__cat{font-size:2.2rem;margin-bottom:.4rem}
  .footer p{margin:.25rem 0;font-size:.86rem;line-height:1.5}
  .footer a{color:var(--green-d);font-weight:800;text-decoration:none}
  .footer__domain{color:var(--muted);font-size:.76rem;font-weight:700}

  /* vệt chân mèo theo con trỏ */
  .cursor-trail{position:fixed;inset:0;pointer-events:none;z-index:998}
  .cursor-trail .paw{position:absolute;transform:translate(-50%,-50%) rotate(var(--r,0deg));font-size:1rem;animation:pawFade .9s ease-out forwards}
  @keyframes pawFade{0%{opacity:.8;transform:translate(-50%,-50%) rotate(var(--r,0deg)) scale(.55)}100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--r,0deg)) scale(1.3)}}

  h1, .hero .title, h2.sec-title, .player .ex-name{font-family:'Baloo 2','Quicksand',sans-serif}

  /* nút cài app (PWA) */
  .install-fab{position:fixed;right:12px;bottom:78px;z-index:45;border:none;border-radius:999px;padding:11px 16px;font-size:.9rem;font-weight:800;font-family:inherit;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 8px 20px rgba(47,125,58,.4);cursor:pointer;display:none;align-items:center;gap:6px;animation:fabPop .4s}
  .install-fab.show{display:inline-flex}
  @keyframes fabPop{0%{transform:scale(0) translateY(20px)}70%{transform:scale(1.1)}100%{transform:scale(1)}}

  /* mascot chibi Mèo Lực Sĩ */
  .mf{display:block;width:100%;height:100%;overflow:visible}
  .mf-bob{animation:mfBob 2.8s ease-in-out infinite;transform-origin:50% 85%}
  @keyframes mfBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .mf-tail{animation:mfTail 1.7s ease-in-out infinite;transform-origin:46px 128px}
  @keyframes mfTail{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(9deg)}}
  .mf-lift{animation:mfLift 1.15s ease-in-out infinite;transform-origin:110px 122px}
  @keyframes mfLift{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-15deg)}}
  .mf-eye{animation:mfBlink 4.5s infinite;transform-origin:center}
  @keyframes mfBlink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
  .mf-spark{animation:mfSpark 1.6s ease-in-out infinite;transform-origin:153px 40px}
  .mf-spark2{animation:mfSpark 1.9s ease-in-out infinite .4s;transform-origin:153px 102px}
  @keyframes mfSpark{0%,100%{opacity:.3;transform:scale(.6)}50%{opacity:1;transform:scale(1.15)}}
  .hero{display:flex;align-items:center;gap:6px;overflow:visible}
  .hero-txt{flex:1;min-width:0}
  .hero-mascot{flex:none;width:96px;height:101px;pointer-events:none;filter:drop-shadow(0 4px 7px rgba(0,0,0,.18))}
  @media(prefers-reduced-motion:reduce){.mf-bob,.mf-tail,.mf-lift,.mf-eye,.mf-spark,.mf-spark2{animation:none}}

/* ============ STORAGE ============ */
const LS='meofit_history_v1', LS_LV='meofit_level';
function loadHist(){ try{ return JSON.parse(localStorage.getItem(LS))||[] }catch(e){ return [] } }
function saveHist(h){ localStorage.setItem(LS, JSON.stringify(h)); }
function getLevel(){ return parseInt(localStorage.getItem(LS_LV))||1; }
function setLevel(l){ localStorage.setItem(LS_LV, l); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function logDone(sid,lv,kcal){ const h=loadHist(); h.unshift({date:todayStr(),ts:Date.now(),sid,lv,kcal:kcal||0}); saveHist(h); }
function doneToday(){ return loadHist().some(e=>e.date===todayStr()); }
function calcStreak(){
  const h=loadHist(); if(!h.length) return 0;
  const days=new Set(h.map(e=>e.date)); let streak=0,d=new Date();
  if(!days.has(todayStr())) d.setDate(d.getDate()-1);
  for(;;){ const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days.has(s)){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}

function estMinutes(s){
  let sec=0; s.ex.forEach(e=>{ sec += e.sets*e.work + (e.sets-1)*(e.rest||30) + e.sets*3; });

}

/* ============ THEO DÕI CÂN NẶNG & SỐ ĐO (Phase 2) ============ */
function loadWeightLog(){ try{ return JSON.parse(localStorage.getItem('meofit_weightlog'))||[] }catch(e){ return [] } }
function saveWeightLog(a){ try{ localStorage.setItem('meofit_weightlog', JSON.stringify(a)); }catch(e){} }
function sparkline(pts){
  if(!pts.length) return '';
  const ws=pts.map(p=>p.weight), min=Math.min(...ws), max=Math.max(...ws), range=(max-min)||1;
  const W=300,H=92,pad=14,n=pts.length;
  const x=i=> n===1?W/2 : pad+i*(W-2*pad)/(n-1);
  const y=v=> H-pad-(v-min)/range*(H-2*pad);
  const line = n>1?`<polyline points="${pts.map((p,i)=>x(i).toFixed(1)+','+y(p.weight).toFixed(1)).join(' ')}" fill="none" stroke="#3fa34d" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:'';
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.weight).toFixed(1)}" r="3.2" fill="#2f7d3a"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="overflow:visible">${line}${dots}</svg>`;
}
function logWeightToday(){
  const w=+pv('pf-weight'); if(!w){ alert('Nhập cân nặng trước đã nhé 🐾'); return; }
  const e={date:todayStr(),ts:Date.now(),weight:w,waist:+pv('pf-waist')||'',hip:+pv('pf-hip')||'',thigh:+pv('pf-thigh')||'',arm:+pv('pf-arm')||''};
  let log=loadWeightLog().filter(x=>x.date!==e.date); log.push(e); log.sort((a,b)=>a.ts-b.ts); saveWeightLog(log);
  renderTrack();
}
function renderTrack(){
  const el=document.getElementById('pf-track'); if(!el) return;
  const log=loadWeightLog();
  let body;
  if(!log.length){ body='<div class="empty" style="padding:14px">Chưa có dữ liệu. Bấm “Ghi nhận hôm nay” để bắt đầu vẽ biểu đồ 🐾</div>'; }
  else{
    const diff=log[log.length-1].weight-log[0].weight;
    const dtxt = log.length>1 ? `${diff>0?'+':''}${diff.toFixed(1)} kg so với lần đầu` : 'Lần ghi đầu tiên';
    const rows=log.slice(-8).reverse().map(x=>{ const d=new Date(x.ts);
      const extra=[x.waist?`eo ${x.waist}`:'',x.hip?`mông ${x.hip}`:'',x.thigh?`đùi ${x.thigh}`:'',x.arm?`tay ${x.arm}`:''].filter(Boolean).join(' · ');
      return `<div class="hist-item"><div class="e">⚖️</div><div class="d"><div class="n">${x.weight} kg</div><div class="t">${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}${extra?' · '+extra:''}</div></div></div>`; }).join('');
    body=`<div class="metric" style="margin-bottom:10px">${sparkline(log)}<div style="font-size:.8rem;color:var(--muted);font-weight:700;margin-top:4px">${dtxt}</div></div>${rows}`;
  }
  el.innerHTML=`<h2 class="sec-title" style="margin-top:8px">📈 Theo dõi cân nặng & số đo</h2>
    <button class="btn sec" onclick="logWeightToday()" style="margin-bottom:12px">➕ Ghi nhận hôm nay</button>
    ${body}`;
}

/* ============ CALO IN / OUT (Phase 2) ============ */
function loadFood(){ try{ return JSON.parse(localStorage.getItem('meofit_food'))||[] }catch(e){ return [] } }
function saveFood(a){ try{ localStorage.setItem('meofit_food', JSON.stringify(a)); }catch(e){} }
function exMET(e){
  if(e.m==='Khởi động'||e.m==='Dãn cơ') return 2.5;
  if(e.m==='Cardio'||/Jump|Burpee|Climber|Jack/i.test(e.en)) return 8;
  if(e.type==='time'||/giữ/i.test(e.reps)) return 3.3;
  return 3.8;
}
function estKcal(sess,kg){
  let k=0; sess.ex.forEach(e=>{ const hrs=e.sets*((e.work||0)+(e.rest||0))/3600; k+=exMET(e)*kg*hrs; });
  return Math.round(k);
}
function getTargetKcal(){
  const p=loadProfile(); if(!p.height||!p.weight||!p.age) return null;
  const bmr=10*p.weight+6.25*p.height-5*p.age+(p.sex==='nu'?-161:5);
  const tdee=bmr*(p.act||1.375);
  const gf=p.goal==='giam'?0.8:(p.goal==='tang'?1.1:1.0);
  return Math.round(tdee*gf);
}
function todayKcalOut(){ const t=todayStr(); return loadHist().filter(e=>e.date===t).reduce((s,e)=>s+(e.kcal||0),0); }
function todayKcalIn(){ const t=todayStr(); return loadFood().filter(e=>e.date===t).reduce((s,e)=>s+(e.kcal||0),0); }
function addFood(name,kcal){ kcal=+kcal; if(!kcal) return; const f=loadFood(); f.push({date:todayStr(),ts:Date.now(),name:name||'Bữa ăn',kcal}); saveFood(f); renderProgress(); }
function addFoodManual(){ addFood(pv('food-name'), pv('food-kcal')); }
function delFood(ts){ saveFood(loadFood().filter(e=>e.ts!==ts)); renderProgress(); }
function caloCardHTML(){

      <div class="stat"><div class="num" style="font-size:1.2rem;color:#ff6b6b">🔥 ${out}</div><div class="lbl">Đốt (tập)</div></div>
      <div class="stat"><div class="num" style="font-size:1.2rem">${inn-out>=0?'+':''}${inn-out}</div><div class="lbl">Ròng</div></div>
    </div>
    ${target!=null
      ? `<div class="metric" style="background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;padding:13px"><div style="font-size:.82rem;opacity:.95">Mục tiêu ${target} kcal/ngày · ${remain>=0?'còn có thể nạp':'đã vượt'}</div><div class="big" style="color:#fff;font-size:1.7rem">${Math.abs(remain)} kcal</div></div>`

/* ============ AUDIO + HUẤN LUYỆN VIÊN GIỌNG NÓI ============ */
let actx=null;
let SND=true, VOICE=true;
function loadAudioPrefs(){ try{ SND=localStorage.getItem('meofit_snd')!=='0'; VOICE=localStorage.getItem('meofit_voice')!=='0'; }catch(e){} }
function initAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(actx && actx.state==='suspended'){ try{ actx.resume(); }catch(e){} }
}
function beep(freq=880,dur=.15,vol=.25){ if(!SND||!actx) return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.start(); o.stop(actx.currentTime+dur);
}
function beepGo(){ beep(660,.12); setTimeout(()=>beep(900,.2),130); }          // vào hiệp — đi LÊN
function beepTick(){ beep(760,.07,.16); }                                       // đếm
function beepRest(){ beep(500,.16,.22); setTimeout(()=>beep(360,.26,.22),160); }// vào NGHỈ — đi XUỐNG (khác hẳn)
function beepReady(){ beep(880,.09,.2); }                                       // sắp hết nghỉ
function beepDoneSet(){ beep(620,.1); setTimeout(()=>beep(780,.1),110); setTimeout(()=>beep(990,.18),230); } // xong 1 hiệp
function vibrate(ms){ if(navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

/* giọng nói */
let _voice=null, _vlang='vi';
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs=speechSynthesis.getVoices(); if(!vs.length) return;
  const vi=vs.find(v=>/^vi/i.test(v.lang));
  if(vi){ _voice=vi; _vlang='vi'; } else { _voice=vs.find(v=>/^en/i.test(v.lang))||vs[0]; _vlang=_voice?(/^vi/i.test(_voice.lang)?'vi':'en'):'en'; }
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
const PHRASES={ vi:{hold:'giữ',rest:'nghỉ',ready:'sẵn sàng',go:'bắt đầu',done:'tốt lắm',half:'cố lên'},
                en:{hold:'hold',rest:'rest',ready:'ready',go:'go',done:'great job',half:'keep going'} };
function ph(k){ return (PHRASES[_vlang]||PHRASES.en)[k]; }
function say(text){
  if(!VOICE || !('speechSynthesis' in window) || !text) return;
  try{ const u=new SpeechSynthesisUtterance(text); if(_voice){ u.voice=_voice; u.lang=_voice.lang; } u.rate=1.08; u.pitch=1.12; speechSynthesis.speak(u); }catch(e){}
}
function sayNum(n){ say(String(n)); }
function shutUp(){ if('speechSynthesis' in window) try{ speechSynthesis.cancel(); }catch(e){} }

function updateAudioBtns(){
  const s=document.getElementById('sndBtn'), v=document.getElementById('voiceBtn');
  if(s){ s.textContent=SND?'🔊':'🔇'; s.classList.toggle('off',!SND); }
  if(v){ v.textContent=VOICE?'🗣️':'🤫'; v.classList.toggle('off',!VOICE); }
}
function toggleSnd(){ SND=!SND; try{localStorage.setItem('meofit_snd',SND?'1':'0')}catch(e){} if(SND) initAudio(); updateAudioBtns(); }
function toggleVoice(){ VOICE=!VOICE; try{localStorage.setItem('meofit_voice',VOICE?'1':'0')}catch(e){} if(!VOICE) shutUp(); updateAudioBtns(); }

/* ============ WORKOUT PLAYER ============ */
const P={sess:null,exIdx:0,setIdx:0,timer:null,remain:0,total:0,paused:false,onEnd:null,redraw:null,repN:0,spoken:0};
const RING_R=100, RING_C=2*Math.PI*RING_R;

function repCount(e){
  if(e.type!=='reps') return 0;
  const m=String(e.reps).match(/(\d+)(?:\s*[–-]\s*(\d+))?/);
  return m?parseInt(m[2]||m[1]):0;
}
function startWorkout(id){
  initAudio(); loadAudioPrefs(); updateAudioBtns();
  if(VOICE) say(ph('ready')); // mở khoá giọng nói bằng cú chạm
  P.sess=sessById(id); P.exIdx=0; P.setIdx=0; P.paused=false;
  document.getElementById('p-session').textContent=P.sess.icon+' '+P.sess.name+' · '+LEVELS[getLevel()].name;
  document.getElementById('player').classList.add('show');
  enterExercise();
}
function closePlayer(){ clearInterval(P.timer); P.timer=null; P.paused=false; shutUp(); document.getElementById('player').classList.remove('show'); }
document.getElementById('p-close').onclick=()=>{ if(confirm('Thoát buổi tập? Tiến độ buổi này sẽ không được lưu.')) closePlayer(); };

function updateBar(){
  const ex=P.sess.ex; let tot=0,done=0;
  ex.forEach((e,i)=>{ tot+=e.sets; if(i<P.exIdx) done+=e.sets; else if(i===P.exIdx) done+=P.setIdx; });
  document.getElementById('pbar-fill').style.width=(done/tot*100)+'%';
}
function nextName(){
  const ex=P.sess.ex;
  if(P.setIdx<ex[P.exIdx].sets-1) return 'Hiệp '+(P.setIdx+2)+' • '+ex[P.exIdx].n;
  if(P.exIdx<ex.length-1) return 'Tiếp: '+ex[P.exIdx+1].mi+' '+ex[P.exIdx+1].n;
  return 'Bài cuối cùng 🎉';
}
function ringSVG(p,color){
  const off=RING_C*(1-p);
  return `<svg width="230" height="230" viewBox="0 0 230 230">
    <circle cx="115" cy="115" r="${RING_R}" fill="none" stroke="rgba(127,160,127,.28)" stroke-width="16"/>
    <circle cx="115" cy="115" r="${RING_R}" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${RING_C}" stroke-dashoffset="${off}"/></svg>`;
}
function header(e){
  return `<div class="phase-lbl" id="phase-lbl"></div>
    <div class="ex-name">${e.mi} ${e.n}</div>
    <div class="ex-tag"><span class="tag" style="background:${tagColor(e.m)}">${e.m}</span></div>`;
}
function pBtn(){ return `<button class="btn" style="background:linear-gradient(135deg,#ffa94d,#f0871f)" onclick="togglePause()">${P.paused?'▶️ Tiếp tục':'⏸ Tạm dừng'}</button>`; }

// đồng hồ đếm ngược có hỗ trợ Tạm dừng
function runCountdown(total, tick, end){
  clearInterval(P.timer); P.remain=total; P.total=total; P.onEnd=end;
  tick();
  P.timer=setInterval(()=>{
    if(P.paused) return;
    P.remain--;
    if(P.remain<=0){ P.remain=0; clearInterval(P.timer); P.timer=null; tick(); const f=P.onEnd; P.onEnd=null; if(f) f(); return; }
    tick();
  },1000);
}
function togglePause(){
  if(!P.timer) return;
  P.paused=!P.paused;
  if(P.paused) shutUp();
  if(P.redraw) P.redraw();
}

// Thẻ hướng dẫn ngay trong buổi tập — tự tạm dừng, link mở tab mới (không mất tiến trình)
let _guidePaused=false, _demoTimer=null;
function startDemo(folder){
  clearInterval(_demoTimer); _demoTimer=null;
  const img=document.getElementById('demoImg'); if(!img) return;
  const base=DEMO_BASE+folder+'/'; let f=0;
  img.src=base+'0.jpg';
  _demoTimer=setInterval(()=>{ f^=1; img.src=base+f+'.jpg'; }, 900);
}
function openGuide(){
  if(!P.sess) return;
  const e=P.sess.ex[P.exIdx];
  if(P.timer && !P.paused){ _guidePaused=true; P.paused=true; shutUp(); if(P.redraw) P.redraw(); } else _guidePaused=false;
  const demo=DEMO[e.n];
  const links=`<div class="links">
    <a class="vid" href="${yt(e.en+' exercise tutorial')}" target="_blank" rel="noopener">▶️ Cách tập đúng</a>
    ${e.gymName?`<a href="${yt(e.gymName.split('/')[0]+' machine how to')}" target="_blank" rel="noopener">🔍 Xem máy tập</a>`:''}</div>`;
  document.getElementById('guideSheet').innerHTML=`
    <div class="guide-card">
      ${demo?`<img id="demoImg" class="demo-img" alt="Minh hoạ động tác" referrerpolicy="no-referrer" onerror="this.style.display='none'"><div class="demo-cap">🎬 Minh hoạ động tác (đầu → cuối)</div>`:''}
      <div class="guide-h">${e.mi} ${e.n}</div>
      <span class="tag" style="background:${tagColor(e.m)}">${e.m}</span>
      <div class="g-meta">${e.sets} hiệp × ${e.reps}${e.perSide?' (cả 2 bên)':''} • 💡 ${e.tempo}</div>
      <div class="ex" style="box-shadow:none;background:transparent;border-left:none;padding:0;margin:0">
        <div class="muscle">${muscleArt(e.m)}<div class="m-txt"><b>💪 Cơ tác động:</b> Chính — ${e.mp}${e.ms?` · <span style="opacity:.85">Phụ — ${e.ms}</span>`:''}</div></div>
        ${e.gymName?`<div class="gym"><b>🏋️ Khi tập gym:</b> ${e.gymName}${links}</div>`:`<div class="gym">🧘 Không cần dụng cụ — bài khởi động/dãn cơ.${links}</div>`}
      </div>
      <button class="btn" onclick="closeGuide()">${_guidePaused?'▶️ Đóng & tập tiếp':'✓ Đóng'}</button>
      <div style="font-size:.74rem;color:var(--muted);text-align:center;margin-top:8px">Video mở ở tab mới — không mất tiến trình tập 🐾</div>
    </div>`;
  document.getElementById('guideSheet').classList.add('show');
  if(demo) startDemo(demo);
}
function closeGuide(){
  clearInterval(_demoTimer); _demoTimer=null;
  document.getElementById('guideSheet').classList.remove('show');
  if(_guidePaused){ _guidePaused=false; P.paused=false; if(P.redraw) P.redraw(); }
}

function enterExercise(){ P.setIdx=0; updateBar(); enterSet(); }
function enterSet(){ clearInterval(P.timer); P.timer=null; P.paused=false; updateBar(); startPrep(()=>startWork()); }

function startPrep(then){
  const e=P.sess.ex[P.exIdx];
  if(VOICE) say(ph('ready'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      ${header(e)}
      <div class="ring">${ringSVG(P.remain/3,'var(--yellow)')}<div class="num"><div class="big">${P.remain||'🐾'}</div><div class="small">Sẵn sàng…</div></div></div>
      <div class="setinfo">Hiệp ${P.setIdx+1}/${e.sets}</div>
      <div class="target">🎯 ${e.reps}${e.perSide?' (cả 2 bên)':''}</div>
      <div class="tempo">💡 ${e.tempo}</div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="skipExercise()">⏭ Bỏ bài</button></div>`;
    document.getElementById('phase-lbl').textContent=P.paused?'⏸ Tạm dừng':'Chuẩn bị';
  };
  P.redraw=draw;
  runCountdown(3, ()=>{ if(P.remain>0){ beepTick(); sayNum(P.remain); } draw(); }, then);
}

function startWork(){
  const e=P.sess.ex[P.exIdx], total=e.work; P.repN=repCount(e); P.spoken=0;
  beepGo(); vibrate(120);
  if(P.repN===0) say(/giữ/i.test(e.reps)?ph('hold'):ph('go'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      ${header(e)}
      <div class="ring">${ringSVG(P.remain/total,tagColor(e.m))}<div class="num"><div class="big">${P.remain}</div><div class="small">giây</div></div></div>
      <div class="setinfo">Hiệp ${P.setIdx+1}/${e.sets}${P.repN?` · đếm ${P.spoken}/${P.repN}`:''}</div>
      <div class="target">🎯 ${e.reps}${e.perSide?' (cả 2 bên)':''}</div>
      <div class="tempo">💡 ${e.tempo}</div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="finishSet()">✓ Xong sớm</button></div>
      <div class="controls"><button class="btn sec" onclick="skipExercise()">⏭ Bỏ bài</button></div>`;
    document.getElementById('phase-lbl').textContent=P.paused?'⏸ Tạm dừng':'Thực hiện';
  };
  P.redraw=draw;
  runCountdown(total, ()=>{
    if(P.repN>0){
      const elapsed=total-P.remain, pace=total/P.repN;
      const no=Math.min(P.repN, Math.floor(elapsed/pace)+1);
      if(no>P.spoken){ P.spoken=no; sayNum(no); beepTick(); }
    } else if(P.remain<=3 && P.remain>0){ beepTick(); sayNum(P.remain); }
    draw();
  }, ()=>{ vibrate([120,80,120]); finishSet(); });
}

function finishSet(){
  clearInterval(P.timer); P.timer=null; P.paused=false;
  const e=P.sess.ex[P.exIdx];
  if(P.setIdx<e.sets-1){ beepDoneSet(); startRest(e.rest||30, ()=>{ P.setIdx++; enterSet(); }); }
  else { say(ph('done')); nextExercise(); }
}
function startRest(sec,then){
  beepRest(); say(ph('rest'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      <div class="phase-lbl" style="color:var(--blue)">${P.paused?'⏸ Tạm dừng':'Nghỉ giữa hiệp'}</div>
      <div class="ex-name" style="color:var(--blue)">😮‍💨 Hít thở sâu</div><div class="ex-tag"></div>
      <div class="ring">${ringSVG(P.remain/sec,'var(--blue)')}<div class="num"><div class="big" style="color:var(--blue)">${P.remain}</div><div class="small">giây nghỉ</div></div></div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="skipRest()">⏭ Bỏ nghỉ</button></div>`;
  };
  P.redraw=draw;
  runCountdown(sec, ()=>{ if(P.remain<=3 && P.remain>0){ beepReady(); sayNum(P.remain); } draw(); },
    ()=>{ beepGo(); vibrate(100); then(); });
}
function skipRest(){ if(!P.onEnd) return; clearInterval(P.timer); P.timer=null; P.paused=false; const f=P.onEnd; P.onEnd=null; f(); }
function skipExercise(){ clearInterval(P.timer); P.timer=null; P.paused=false; P.onEnd=null; shutUp(); nextExercise(); }
function nextExercise(){ if(P.exIdx<P.sess.ex.length-1){ P.exIdx++; enterExercise(); } else finishWorkout(); }

function finishWorkout(){
  clearInterval(P.timer); P.timer=null; P.paused=false;
  logDone(P.sess.id, getLevel(), estKcal(P.sess, (loadProfile().weight)||60));
  document.getElementById('pbar-fill').style.width='100%';
  beepDoneSet(); say(ph('done'));
  const streak=calcStreak();
  document.getElementById('p-center').innerHTML=`
    <div class="done-screen">
      <div class="big-emoji">🎉</div>
      <div class="ex-name" style="color:var(--green-d)">Hoàn thành ${P.sess.name}!</div>
      <p style="color:var(--muted);font-weight:600;margin:6px 0 4px">Giỏi quá đi 🐾 Đừng quên dãn cơ kỹ nhé!</p>
      <div class="chip" style="background:var(--green-l);color:#fff;display:inline-block;margin:10px 0 20px">🔥 Chuỗi ${streak} ngày</div>
      <div class="controls"><button class="btn" onclick="closePlayer();go('prog')">📊 Xem tiến độ</button></div>
      <div class="controls"><button class="btn sec" onclick="closePlayer();go('home')">🏠 Về trang chủ</button></div>
    </div>`;
}

/* ============ THEME (đồng bộ Meomoe: light / dark / sakura, khoá meo:theme) ============ */
const THEMES=['light','dark','sakura'];
const THEME_ICON={light:'☀️',dark:'🌙',sakura:'🌸'};
function applyTheme(t){
  if(!THEMES.includes(t)) t='light';
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('meo:theme', t); }catch(e){}
  const b=document.getElementById('themeBtn'); if(b) b.textContent=THEME_ICON[t];
}
function initTheme(){ let t='light'; try{ t=localStorage.getItem('meo:theme')||'light'; }catch(e){} applyTheme(t); }
function cycleTheme(){ let t='light'; try{ t=localStorage.getItem('meo:theme')||'light'; }catch(e){} applyTheme(THEMES[(THEMES.indexOf(t)+1)%THEMES.length]); }

/* ============ INIT ============ */
(function(){
  initTheme();
  loadAudioPrefs(); updateAudioBtns();
  const tb=document.getElementById('themeBtn'); if(tb) tb.onclick=cycleTheme;
  document.getElementById('mascot').innerHTML = meoFitCat();
  // hoa lá rơi
  const f=document.getElementById('flowers'), em=['🌸','🌼','🌷','🌿','🍀','🌺','💚','🌻'];
  for(let i=0;i<14;i++){ const s=document.createElement('span'); s.textContent=em[i%em.length];
    s.style.left=(Math.random()*96)+'%'; s.style.top=(Math.random()*92)+'%';
    s.style.fontSize=(14+Math.random()*16)+'px'; s.style.animationDelay=(Math.random()*9)+'s';
    s.style.animationDuration=(7+Math.random()*6)+'s'; f.appendChild(s); }
  // vệt chân mèo 🐾 theo con trỏ (chỉ trên thiết bị có chuột)
  const trail=document.getElementById('trail'); let last=0;
  window.addEventListener('mousemove', e=>{
    const now=e.timeStamp||performance.now(); if(now-last<70) return; last=now;
    const p=document.createElement('span'); p.className='paw'; p.textContent='🐾';
    p.style.left=e.clientX+'px'; p.style.top=e.clientY+'px';
    p.style.setProperty('--r',(Math.random()*60-30)+'deg');
    trail.appendChild(p); setTimeout(()=>p.remove(),900);
  }, {passive:true});
})();
renderHome();
try{ const _t=location.hash.slice(1); if(_t && document.getElementById('v-'+_t)) go(_t); }catch(e){}

/* PWA — chạy offline (đăng ký service worker theo đường dẫn tương đối) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

/* Nút "Cài app" — Android/Chrome dùng beforeinstallprompt; iOS hiện hướng dẫn */
(function(){
  const btn=document.getElementById('installBtn'); if(!btn) return;
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(standalone) return; // đã cài rồi thì ẩn
  let deferred=null;
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; btn.textContent='📲 Cài MèoFit'; btn.classList.add('show'); });
  window.addEventListener('appinstalled', ()=>{ btn.classList.remove('show'); deferred=null; });
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS){ btn.classList.add('show'); }
  btn.onclick=async ()=>{
    if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; btn.classList.remove('show'); }
    else { alert('Cài MèoFit vào màn hình chính 🐾\n\niPhone: bấm nút Chia sẻ ⎙ ở thanh Safari → "Thêm vào MH chính".\nAndroid: menu ⋮ → "Cài đặt ứng dụng / Thêm vào MH chính".'); }
  };
})();
</script>
