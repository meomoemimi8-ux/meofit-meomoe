<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#3fa34d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="MèoFit" />
<title>MèoFit 🐾 — Lịch tập tại nhà</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=21" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=21" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png?v=21" />
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png?v=21" />
<style>
  :root{
    /* màu nhận diện vũ trụ Mèo Lực Sĩ — giữ nguyên qua mọi theme */
    --green:#3fa34d; --green-d:#2f7d3a; --green-l:#7bd389;
    --red:#ff6b6b; --blue:#4dabf7; --yellow:#ffd43b; --purple:#b197fc; --pink:#ff8fb1; --orange:#ffa94d; --teal:#38d9c9;
    /* tokens theo hệ Meomoe — LIGHT */
    --bg:#f4fbf2; --bg-1:#e7f9e4; --bg-2:#fff3f6;
    --card:#ffffff; --surface-2:#f3f8f1; --border:#e3efe2;
    --ink:#2b3a2e; --muted:#789078;
    --shadow:0 8px 22px rgba(63,163,77,.14);
    --r:22px; font-size:16px;
    --paw:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='34'%20height='34'%20viewBox='0%200%2034%2034'%3E%3Cg%20transform='rotate(-25%2017%2017)'%20stroke='%23d65b86'%20stroke-width='1.5'%20stroke-linejoin='round'%3E%3Crect%20x='11'%20y='14.5'%20width='12'%20height='5'%20rx='2.5'%20fill='%23ff8fb1'/%3E%3Crect%20x='6'%20y='11'%20width='5'%20height='12'%20rx='2.5'%20fill='%23ffb3c9'/%3E%3Crect%20x='23'%20y='11'%20width='5'%20height='12'%20rx='2.5'%20fill='%23ffb3c9'/%3E%3Crect%20x='2.5'%20y='9'%20width='4.5'%20height='16'%20rx='2'%20fill='%23ff8fb1'/%3E%3Crect%20x='27'%20y='9'%20width='4.5'%20height='16'%20rx='2'%20fill='%23ff8fb1'/%3E%3C/g%3E%3C/svg%3E") 17 17;
    --cur-active:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='30'%20height='30'%20viewBox='0%200%2030%2030'%3E%3Ccircle%20cx='15'%20cy='15'%20r='13'%20fill='%23ff8fb1'%20stroke='%23d65b86'%20stroke-width='2.5'/%3E%3Ccircle%20cx='15'%20cy='15'%20r='4.5'%20fill='%23fff'%20stroke='%23d65b86'%20stroke-width='1.5'/%3E%3C/svg%3E") 15 15;
  }
  [data-theme='dark']{
    --bg:#16201a; --bg-1:#1d2a22; --bg-2:#241d2f;
    --card:#1f2b24; --surface-2:#26332b; --border:rgba(255,255,255,.10);
    --ink:#e9f5ea; --muted:#9db4a2; --green-l:#8fe09b;
    --shadow:0 8px 22px rgba(0,0,0,.45);
  }
  [data-theme='sakura']{
    --bg:#fff0f5; --bg-1:#ffd8e8; --bg-2:#ffe5f0;
    --card:#fffafc; --surface-2:#fff2f7; --border:#ffd9e6;
    --ink:#5a3a48; --muted:#a96f88;
    --shadow:0 10px 26px rgba(255,127,163,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 8%, var(--bg-1) 0, transparent 40%),
      radial-gradient(circle at 88% 4%, var(--bg-2) 0, transparent 35%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    padding-bottom:84px;
    overflow-x:hidden;
    transition:background .5s,color .5s;
    cursor:var(--paw),auto;
  }
  a,button{cursor:var(--paw),pointer}
  *:active{cursor:var(--cur-active),auto !important}
  .flowers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .flowers span{position:absolute;font-size:20px;opacity:.5;animation:float 9s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(12deg)}}
  .burst{position:fixed;pointer-events:none;z-index:999;transform:translate(-50%,-50%);will-change:transform,opacity;animation:burstFly .76s ease-out forwards}
  @keyframes burstFly{0%{transform:translate(-50%,-50%) scale(.3);opacity:1}100%{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% + var(--dy,0px))) scale(1.15) rotate(45deg);opacity:0}}

  .app{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto;padding:14px 16px 0}

  header.top{position:relative;display:flex;align-items:center;gap:10px;justify-content:center;padding:8px 4px 14px}
  header.top .logo{font-size:30px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12))}
  .theme-btn{position:absolute;right:2px;top:8px;border:none;background:var(--card);box-shadow:var(--shadow);width:40px;height:40px;border-radius:50%;font-size:1.15rem;cursor:var(--paw),pointer;transition:transform .18s}
  .theme-btn:active{transform:scale(.9) rotate(-12deg)}
  header.top h1{font-size:1.45rem;margin:0;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--green-d),var(--green-l),var(--purple));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}

  .hero{background:linear-gradient(135deg,var(--green) 0%,var(--green-l) 100%);color:#fff;border-radius:26px;padding:20px;box-shadow:0 12px 26px rgba(63,163,77,.35);position:relative;overflow:hidden;margin-bottom:14px}
  .hero::after{content:none}
  .hero .day{font-size:.95rem;opacity:.92;font-weight:600}
  .hero .title{font-size:1.55rem;font-weight:800;margin:4px 0 2px}
  .hero .sub{font-size:.92rem;opacity:.95}
  .hero .extra{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:700;backdrop-filter:blur(4px)}

  .stats{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border-radius:18px;padding:12px;text-align:center;box-shadow:var(--shadow)}
  .stat .num{font-size:1.5rem;font-weight:800;color:var(--green-d)}
  .stat .lbl{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:2px}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:18px;padding:16px;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 8px 18px rgba(47,125,58,.35);cursor:var(--paw),pointer;transition:transform .08s;font-family:inherit}
  .btn:active{transform:scale(.97)}
  .btn.sec{background:var(--card);color:var(--green-d);border:2px solid var(--green-l);box-shadow:none}
  .btn.rest-day{background:linear-gradient(135deg,#b197fc,#9775fa);box-shadow:0 8px 18px rgba(151,117,250,.35)}

  h2.sec-title{font-size:1.05rem;margin:6px 4px 10px;font-weight:800;display:flex;align-items:center;gap:7px}

  /* level selector */
  .levels{margin-bottom:14px}
  .levels .lab{font-size:.78rem;color:var(--muted);font-weight:700;margin:0 4px 6px}
  .seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:16px}
  .seg button{flex:1;border:none;background:none;padding:9px 4px;border-radius:12px;font-weight:800;color:var(--muted);font-family:inherit;font-size:.8rem;cursor:var(--paw),pointer;line-height:1.15}
  .seg button small{display:block;font-size:.62rem;font-weight:600;opacity:.85;margin-top:2px}
  .seg button.on{background:var(--card);color:var(--green-d);box-shadow:var(--shadow)}

  .week-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:16px;margin-bottom:8px;background:var(--card);box-shadow:var(--shadow)}
  .week-row.today{outline:3px solid var(--green-l);background:var(--surface-2)}
  .week-row .dow{width:46px;font-weight:800;color:var(--green-d);font-size:.92rem;flex:none;text-align:center}
  .week-row .body{flex:1}
  .week-row .body .nm{font-weight:700;font-size:.96rem}
  .week-row .body .tg{font-size:.76rem;color:var(--muted)}
  .week-row .dot{width:10px;height:10px;border-radius:50%;flex:none}

  .sess-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:20px;margin-bottom:12px;color:#fff;cursor:var(--paw),pointer;box-shadow:var(--shadow);transition:transform .08s}
  .sess-card:active{transform:scale(.98)}
  .sess-card .ic{font-size:30px}
  .sess-card .info{flex:1}
  .sess-card .info .t{font-weight:800;font-size:1.12rem}
  .sess-card .info .s{font-size:.8rem;opacity:.92}
  .sess-card .arrow{font-size:1.4rem;opacity:.9}
  .sess-card .badge-done{background:rgba(255,255,255,.3);border-radius:14px;padding:3px 9px;font-size:.72rem;font-weight:700}

  .ex{background:var(--card);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:6px solid var(--green-l)}
  .ex .row1{display:flex;align-items:flex-start;gap:10px}
  .ex .idx{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex:none}
  .ex .nm{font-weight:800;font-size:1.02rem;line-height:1.25}
  .ex .meta{font-size:.82rem;color:var(--green-d);font-weight:700;margin-top:2px}
  .tag{display:inline-block;padding:3px 9px;border-radius:12px;font-size:.72rem;font-weight:800;color:#fff;margin-top:7px}
  .ex .muscle{display:flex;gap:11px;align-items:center;font-size:.82rem;color:var(--ink);margin-top:9px;line-height:1.45;background:var(--surface-2);padding:9px 11px;border-radius:12px}
  .ex .muscle b{color:var(--green-d)}
  .ex .muscle .m-txt{flex:1}
  .bodymap{flex:none;width:74px;text-align:center}
  .bodymap .m-img{width:74px;height:92px;object-fit:contain;border-radius:12px;background:#fbfdfa;border:1px solid var(--border);display:block}
  .bodymap .m-img.gif{background:#f4f9f2}
  .bodymap .bm-lbl{font-size:.57rem;color:var(--muted);font-weight:700;margin-top:3px;line-height:1.2}
  .ex .gym{font-size:.82rem;color:var(--muted);margin-top:8px;line-height:1.45;background:var(--surface-2);padding:9px 11px;border-radius:12px;border-left:4px solid var(--yellow)}
  .ex .gym b{color:var(--ink)}
  .altbox{font-size:.82rem;color:var(--muted);margin-top:8px;line-height:1.45;background:var(--surface-2);padding:9px 11px;border-radius:12px;border-left:4px solid var(--blue)}
  .altbox b{color:var(--ink)}
  .ex .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .ex .links a{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;font-weight:800;text-decoration:none;padding:5px 10px;border-radius:20px;background:var(--surface-2);color:var(--green-d)}
  .ex .links a.vid{background:rgba(255,107,107,.16);color:var(--red)}

  nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;background:var(--card);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom));max-width:600px;margin:0 auto}
  nav.tabbar button{background:none;border:none;flex:1;padding:7px 2px;cursor:var(--paw),pointer;color:var(--muted);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;font-weight:700;transition:color .15s}
  nav.tabbar button .i{font-size:1.35rem;transition:transform .15s}
  nav.tabbar button.active{color:var(--green-d)}
  nav.tabbar button.active .i{transform:translateY(-2px) scale(1.12)}

  .player{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,var(--bg-1),var(--bg));display:none;flex-direction:column;padding:18px;padding-top:calc(18px + env(safe-area-inset-top))}
  .player.show{display:flex}
  .player .pbar{height:8px;border-radius:8px;background:var(--surface-2);overflow:hidden;margin-bottom:10px}
  .player .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green-l),var(--green));transition:width .3s}
  .player .phead{display:flex;justify-content:space-between;align-items:center;font-weight:800;color:var(--green-d);margin-bottom:10px}
  .player .phead .x{background:var(--card);border:none;width:38px;height:38px;border-radius:50%;font-size:1.1rem;box-shadow:var(--shadow);cursor:var(--paw),pointer;color:var(--ink)}
  .player .phead{gap:8px}
  .player #p-session{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .player .phead-btns{display:flex;gap:6px;align-items:center;flex:none}
  .player .picon{background:var(--card);border:none;width:36px;height:36px;border-radius:50%;font-size:1rem;box-shadow:var(--shadow);cursor:var(--paw),pointer}
  .player .picon.off{opacity:.4}
  /* thẻ hướng dẫn trong player (không mất tiến trình) */
  .guide-sheet{position:absolute;inset:0;z-index:10;background:rgba(0,0,0,.4);display:none;align-items:flex-end}
  .guide-sheet.show{display:flex;animation:fade .2s}
  .guide-card{background:var(--bg);width:100%;max-height:90%;overflow-y:auto;border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.25);animation:sheetUp .25s}
  @keyframes sheetUp{from{transform:translateY(50px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .guide-card .guide-h{font-weight:800;font-size:1.2rem;line-height:1.25;margin-bottom:8px}
  .guide-card .g-meta{font-size:.85rem;color:var(--green-d);font-weight:700;margin:9px 0 4px}
  .guide-card .btn{margin-top:14px}
  .guide-card .demo-img{width:100%;height:auto;max-height:320px;object-fit:contain;border-radius:14px;background:#f1f3f0;display:block}
  .guide-card .demo-cap{font-size:.72rem;color:var(--muted);font-weight:700;text-align:center;margin:5px 0 10px}

  /* form hồ sơ */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin:0 2px 5px}
  .field input,.field select{width:100%;border:2px solid var(--border);border-radius:14px;padding:11px 13px;font-size:1rem;font-family:inherit;background:var(--card);color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--green-l)}
  .frow{display:flex;gap:10px}.frow .field{flex:1;min-width:0}
  .field input,.field select{box-sizing:border-box}
  .metric{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:center}
  .metric .big{font-size:2rem;font-weight:800;color:var(--green-d);line-height:1.1}
  .bmi-badge{display:inline-block;padding:3px 12px;border-radius:20px;color:#fff;font-weight:800;font-size:.8rem;margin-top:5px}
  .plan-card{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
  .plan-card.on{outline:3px solid var(--green-l)}
  .plan-h{font-weight:800;font-size:1.02rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .plan-d{font-size:.82rem;color:var(--muted);margin:6px 0 10px;line-height:1.45}
  .rec-badge{font-size:.66rem;background:var(--yellow);color:#6a5413;padding:2px 8px;border-radius:10px;font-weight:800}
  .plan-using{color:var(--green-d);font-weight:800;font-size:.92rem}
  /* ===== Builder (Tự xây) ===== */
  .seg-mode{margin-bottom:14px}
  .plan-switch{margin:6px 0 14px;background:var(--surface-2);border-radius:16px;padding:4px 12px}
  .plan-switch summary{cursor:var(--paw),pointer;font-weight:800;color:var(--green-d);font-size:.86rem;padding:8px 2px}
  .build-tray{position:sticky;top:8px;z-index:5;padding:14px;border:2px solid var(--green-l)}
  .bchips{display:flex;flex-wrap:wrap;gap:6px}
  .bchip{font-size:.74rem;font-weight:800;border:1.5px solid;border-radius:999px;padding:3px 9px;background:var(--card)}
  .lib-grp{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
  .lib-grp summary{cursor:var(--paw),pointer;font-weight:800;padding:12px 14px;font-size:.95rem}
  .lib-need{font-size:.7rem;color:var(--muted);font-weight:600;margin-left:4px}
  .lib-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--border);cursor:var(--paw),pointer;transition:background .1s}
  .lib-row:hover{background:var(--surface-2)}
  .lib-row.on{background:color-mix(in srgb,var(--green-l) 22%,transparent)}
  .lib-pick{flex:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;background:var(--surface-2);color:var(--muted)}
  .lib-row.on .lib-pick{background:var(--green);color:#fff}
  .lib-info{flex:1;min-width:0}
  .lib-n{font-weight:700;font-size:.9rem}
  .lib-m{font-size:.74rem;color:var(--muted);margin-top:1px}
  .lib-vid{flex:none;text-decoration:none;font-size:1.1rem;padding:4px}
  .tpl-row{display:flex;flex-direction:column;gap:7px}
  .tpl-btn{text-align:left;width:100%;font-size:.85rem}
  .bname{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:.9rem;background:var(--surface-2);color:var(--ink);box-sizing:border-box}
  .seg-diff{margin-bottom:8px}
  .pk-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .pk-row{display:flex;align-items:center;gap:8px;background:var(--surface-2);border-radius:12px;padding:7px 9px}
  .pk-n{flex:1;min-width:0;font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pk-step{flex:none;display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:700}
  .pk-step button{width:24px;height:24px;border:none;border-radius:8px;background:var(--card);color:var(--green-d);font-weight:900;font-size:1rem;cursor:var(--paw),pointer;box-shadow:var(--shadow)}
  .pk-reps{flex:none;width:78px;padding:5px 7px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.74rem;background:var(--card);color:var(--ink)}
  .pk-x{flex:none;border:none;background:none;color:var(--muted);font-size:.9rem;cursor:var(--paw),pointer;padding:4px}
  .lib-need.ok{color:var(--green-d);font-weight:800}
  .g-rec{font-size:.64rem;font-weight:800;color:#1f7a52;background:var(--green-l);padding:2px 7px;border-radius:8px}
  .fchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .fchip{border:1.5px solid var(--border);background:var(--surface-2);color:var(--muted);border-radius:999px;padding:6px 11px;font-size:.78rem;font-weight:700;font-family:inherit;cursor:var(--paw),pointer}
  .fchip.on{background:var(--green-l);border-color:var(--green-d);color:#1f7a52}
  .slog-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-top:1px solid var(--border)}
  .slog-n{flex:1;min-width:0;font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slog-in{flex:none;width:62px;padding:7px 8px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.82rem;background:var(--surface-2);color:var(--ink);text-align:center}
  .focus-card{background:var(--card);border-radius:16px;padding:15px;box-shadow:var(--shadow);margin-bottom:11px;cursor:var(--paw),pointer;transition:transform .08s}
  .focus-card:active{transform:scale(.99)}
  .fc-h{font-weight:800;font-size:1.04rem;display:flex;align-items:center}
  .fc-h .arrow{margin-left:auto;opacity:.4;font-size:1.2rem}
  .fc-d{font-size:.82rem;color:var(--muted);margin-top:3px;line-height:1.4}
  .bld-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .bld-head .bld-back{width:auto;padding:9px 13px;flex:none}
  .bld-title{font-weight:800;font-size:1.12rem}
  .food-chips{display:flex;flex-wrap:wrap;gap:6px}

function curPlanId(){ try{ return localStorage.getItem('meofit_plan')||'home' }catch(e){ return 'home' } }
function curPlan(){ return PLANS[curPlanId()]||PLANS.home; }
function setPlan(id){ if(!PLANS[id]) return; try{ localStorage.setItem('meofit_plan',id); }catch(e){} if(getLevel) setLevel(1); _sessMode='plans'; renderSessList(); renderHome(); }
function recommendPlan(){ const p=loadProfile(); return p.equip==='gym'?'gym':'home'; }
function planPickerHTML(){
  const p=loadProfile(), cur=curPlanId(), rec=recommendPlan();
  const goalTxt={giam:'giảm mỡ',giu:'giữ dáng',tang:'tăng cơ'}[p.goal||'giu'];
  const equipTxt={home:'tại nhà',gym:'ở phòng gym',both:'linh hoạt'}[p.equip||'home'];
  const cards=Object.values(PLANS).filter(pl=>pl.id!=='custom'||pl.sessions.length).map(pl=>{
    const active=pl.id===cur, isRec=pl.id===rec;
    return `<div class="plan-card ${active?'on':''}" style="border-left:6px solid ${pl.grad.match(/#\w+/)[0]}">
      <div class="plan-h">${pl.emoji} ${pl.name} ${isRec?'<span class="rec-badge">Mèo gợi ý ⭐</span>':''}</div>
      <div class="plan-d">${pl.desc}</div>
      ${active?`<div class="plan-using">✅ Đang dùng</div>`:`<button class="btn sec" onclick="setPlan('${pl.id}')">Chọn gói này</button>`}
    </div>`;
  }).join('');
  return `<h2 class="sec-title" style="margin-top:10px">🎯 Lộ trình tập</h2>
    <div class="card" style="text-align:center">
      <div style="font-size:1.5rem">🐾🐱</div>
      <div style="font-weight:800;color:var(--green-d)">Mèo Lực Sĩ gợi ý</div>
      <p style="color:var(--muted);font-size:.85rem;margin:6px 0 0">Mục tiêu <b>${goalTxt}</b>, tập <b>${equipTxt}</b> → nên theo gói <b>${PLANS[rec].name}</b> 💪</p></div>
    ${cards}`;
}
const weekByDay = d => curPlan().week.find(w=>w.day===d);

function loadCustomSessions(){ try{ return JSON.parse(localStorage.getItem('meofit_customsessions'))||[] }catch(e){ return [] } }
function saveCustomSessions(a){ try{ localStorage.setItem('meofit_customsessions', JSON.stringify(a)); }catch(e){} }
function autoWeek(sessions){
  // rải buổi vào T2/T4/T6 (xen kẽ nghỉ); nếu >3 buổi thì thêm T7
  const slots=[1,3,5,6,2,4]; const W=[0,1,2,3,4,5,6].map(d=>({day:d,dow:['CN','T2','T3','T4','T5','T6','T7'][d],sid:null,extra:''}));
  sessions.forEach((s,i)=>{ if(i<slots.length){ const row=W.find(w=>w.day===slots[i]); if(row){ row.sid=s.id; row.extra=s.ex.length+' bài'; } } });
  return W;
}
function refreshCustomPlan(){ PLANS.custom.sessions=loadCustomSessions(); PLANS.custom.week=autoWeek(PLANS.custom.sessions); }
function applyTemplate(i){ const t=WEEK_TEMPLATES[i]; if(!t) return; const used=usedExNames(); const picked=[];
  t.ex.forEach(k=>{ let[b,n]=k.split('::'); let e=libFind(b,n);
    if(e && used.has(n)){ const g=EX_LIB.find(x=>x.key===b); const alt=g&&g.items.find(it=>!used.has(it.n)&&!picked.includes(b+'::'+it.n)); if(alt){ k=b+'::'+alt.n; e=alt; } else e=null; }
    if(e && !picked.includes(k)) picked.push(k); });
  _picked=picked; _cfg={}; _picked.forEach(k=>cfgFor(k)); _buildName=t.name; _libOpen=false; renderBuilder(); window.scrollTo(0,0); }
function saveCustomSession(){
  if(!_picked.length){ return; } // nút đã disabled khi rỗng
  const name=(_buildName||'').trim() || ('Buổi của tôi '+(loadCustomSessions().length+1));
  const list=loadCustomSessions();
  const id=900+ (list.reduce((m,s)=>Math.max(m,s.id),899)-899) +1;
  const rm=DIFF[_diff].restMul;
  const ex=[WGS, ..._picked.map(k=>{const[b,n]=k.split('::');const e=libFind(b,n);if(!e)return null;const c=cfgFor(k);
    return {...e, sets:c.sets, reps:c.reps, rest:Math.round((e.rest||30)*rm)}; }).filter(Boolean), PIGEON, WGS_END];
  list.push({id,name,icon:'🛠️',grad:'linear-gradient(135deg,#ff922b,#ff6b9d)',diff:_diff,ex});
  saveCustomSessions(list); refreshCustomPlan(); _picked=[]; _buildName=''; _cfg={}; _focus=null;
  try{ localStorage.setItem('meofit_plan','custom'); }catch(e){}
  if(getLevel) setLevel(1);
  _justSaved=name; _sessMode='plans'; renderSessList(); renderHome(); window.scrollTo(0,0);
}

function e1rm(kg,reps){ return kg>0? Math.round(kg*(1+reps/30)) : 0; } // Epley

let _strEx='';
function saveStrengthSession(){
  if(!P||!P.sess) return;
  const exs=strengthExs(P.sess), ts=Date.now(), date=todayStr(), log=loadStrength(); let n=0;
  exs.forEach((e,i)=>{ const reps=+pv('slog-'+i+'-reps')||0, kg=+pv('slog-'+i+'-kg')||0;
    if(!reps&&!kg) return; log.push({ts:ts+i,date,n:e.n,kg,reps,e1rm:e1rm(kg,reps)}); n++; });

  saveStrength(log);
  const el=document.getElementById('slog-wrap'); if(el) el.innerHTML=`<div class="note-box" style="margin:0">✅ Đã lưu ${n} bài! Xem biểu đồ sức mạnh ở tab Tiến độ 💪</div>`;
}
function strengthChartHTML(){
  const log=loadStrength(); if(!log.length) return '';
  const names=[...new Set(log.map(e=>e.n))];
  const sel=(_strEx&&names.includes(_strEx))?_strEx:names[names.length-1];
  const series=log.filter(e=>e.n===sel).sort((a,b)=>a.ts-b.ts);
  const useKg=series.some(e=>e.kg>0);
  const pts=series.map(e=>({weight: useKg? (e.e1rm||e.kg) : e.reps}));
  const first=pts[0].weight, last=pts[pts.length-1].weight, diff=last-first;
  return `<h2 class="sec-title" style="margin-top:6px">💪 Sức mạnh theo bài</h2>
    <div class="card">
      <select onchange="_strEx=this.value;renderProgress()" style="width:100%;margin-bottom:8px">${names.map(n=>`<option ${n===sel?'selected':''}>${n}</option>`).join('')}</select>
      ${pts.length>1?sparkline(pts):'<div style="font-size:.82rem;color:var(--muted);text-align:center;padding:8px">Cần ≥2 lần ghi để vẽ biểu đồ.</div>'}
      <div style="font-size:.8rem;color:var(--muted);font-weight:700;margin-top:4px">${useKg?'Sức mạnh ước tính (~1RM, kg)':'Số lần/hiệp'} · ${series.length} lần ghi · ${diff>=0?'+':''}${diff} so với đầu ${diff>0?'📈':(diff<0?'📉':'')}</div>
    </div>`;
}
function doneToday(){ return loadHist().some(e=>e.date===todayStr()); }
function calcStreak(){
  const h=loadHist(); if(!h.length) return 0;
  const days=new Set(h.map(e=>e.date)); let streak=0,d=new Date();
  if(!days.has(todayStr())) d.setDate(d.getDate()-1);
  for(;;){ const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days.has(s)){ streak++; d.setDate(d.getDate()-1);} else break; }
  return streak;
}

  const balance=groups.map(([b,need])=>{const have=cnt[b],ok=need?have>=need:have>0;const col=have===0?'var(--muted)':(ok?'var(--green-d)':'var(--orange)');return `<span class="bchip" style="color:${col};border-color:${col}">${EX_LIB.find(g=>g.key===b).emoji} ${b} ${have}${need?'/'+need:''}</span>`;}).join('');

      return `<div class="lib-row ${on?'on':''}" onclick="togglePickEx('${g.key}::${e.n.replace(/'/g,"\\'")}')">

    return `<details class="lib-grp" style="border-left:5px solid ${tagColor(g.key)}" open>

  const libToggle=`<button class="btn sec" onclick="_libOpen=!_libOpen;renderBuilder()" style="margin:6px 0 10px">${_libOpen?'🔼 Thu gọn thư viện':'🔽 Mở thư viện chọn thêm bài'}</button>`;

  const pickedList=_picked.map(k=>{const[b,n]=k.split('::');const e=libFind(b,n);if(!e)return'';const c=cfgFor(k);const ek=k.replace(/'/g,"\\'");
    return `<div class="pk-row">

function bmiClass(b){
  if(b<18.5) return ['Thiếu cân','#4dabf7'];
  if(b<23)   return ['Bình thường','#3fa34d'];
  if(b<25)   return ['Thừa cân','#ffa94d'];
  if(b<30)   return ['Béo phì độ I','#ff8c42'];
  return ['Béo phì độ II','#ff6b6b'];
}
const GOAL_LBL={giam:'giảm mỡ',giu:'giữ dáng',tang:'tăng cơ'};
function pv(id){ const el=document.getElementById(id); return el?el.value:''; }
let _pfEdit=false;
// Nhóm cơ có thể chọn tập trung (khớp LIB_BUCKETS, trừ Cardio)
const FOCUS_OPTS=[['Mông','🍑'],['Chân','🦵'],['Ngực','💪'],['Lưng','🚣'],['Vai','🦅'],['Core / Bụng','🪵']];
function defaultFocus(sex){ return sex==='nam'?['Ngực','Lưng']:['Mông','Core / Bụng']; }
function profFocus(p){ return (p&&p.focus&&p.focus.length)?p.focus:defaultFocus((p&&p.sex)||'nu'); }
function toggleFocus(g){ const p=loadProfile(); let f=(p.focus&&p.focus.length)?p.focus.slice():defaultFocus(p.sex||'nu');
  const i=f.indexOf(g); if(i>=0) f.splice(i,1); else { if(f.length>=2) f.shift(); f.push(g); }
  p.focus=f; saveProfile(p); renderProfile(); }
function readProfileForm(){
  const cur=loadProfile();
  const p={ ...cur, sex:pv('pf-sex'), age:+pv('pf-age')||'', height:+pv('pf-height')||'', weight:+pv('pf-weight')||'',
    act:+pv('pf-act')||1.375, goal:pv('pf-goal')||'giu', macro:pv('pf-macro')||goalMacro(pv('pf-goal')||'giu'), equip:pv('pf-equip')||'home',
    goalWeight:+pv('pf-goalweight')||'', goalWeeks:+pv('pf-goalweeks')||'',
    waist:+pv('pf-waist')||'', hip:+pv('pf-hip')||'', thigh:+pv('pf-thigh')||'', arm:+pv('pf-arm')||'' };
  saveProfile(p);
  return p;
}
function renderResults(p){
  const r=document.getElementById('pf-results'); if(!r) return;
  if(!p.height||!p.weight||!p.age){ r.innerHTML='<div class="note-box">📏 Nhập đủ <b>tuổi, chiều cao, cân nặng</b> để Mèo Lực Sĩ tính chỉ số cho cậu nhé!</div>'; return; }
  const hm=p.height/100, bmi=p.weight/(hm*hm), [bcat,bcol]=bmiClass(bmi);
  const bmr=10*p.weight + 6.25*p.height - 5*p.age + (p.sex==='nu'?-161:5);
  const tdee=bmr*p.act;
  const gf=p.goal==='giam'?0.8:(p.goal==='tang'?1.1:1.0);
  const target=tdee*gf, mg=macroGrams(target,(MACRO_PRESETS[p.macro]||MACRO_PRESETS.canbang).r);
  // ===== Mục tiêu cân nặng (cân khoẻ châu Á BMI 18.5–22.9; an toàn 0.5kg/tuần giảm, 0.3 tăng) =====
  const minW=18.5*hm*hm, maxW=22.9*hm*hm;
  let suggestT, dir;
  if(bmi>22.9){ suggestT=21.5*hm*hm; dir='giảm'; }
  else if(bmi<18.5){ suggestT=20*hm*hm; dir='tăng'; }
  else { suggestT=p.weight; dir='giữ'; }
  const rate = dir==='tăng'?0.3:0.5; // kg/tuần an toàn
  const sDiff=Math.abs(p.weight-suggestT), sWeeks=Math.max(1,Math.round(sDiff/rate));
  const recLine = dir==='giữ'
    ? `Cân của cậu đang trong vùng khoẻ mạnh rồi 🎉 Giữ vững & tập để săn chắc nha!`
    : `Gợi ý ${dir} về <b>${suggestT.toFixed(1)} kg</b> (≈ ${sDiff.toFixed(1)} kg) — an toàn ~${rate}kg/tuần → khoảng <b>${sWeeks} tuần</b> (~${Math.max(1,Math.round(sWeeks/4.3))} tháng).`;
  // người dùng tự nhập
  let userLine='';
  if(p.goalWeight){
    const ud=p.weight-p.goalWeight, udir=ud>0?'giảm':(ud<0?'tăng':'giữ'), uabs=Math.abs(ud);

const _fbStore={db:null};
// Các "ngăn" dữ liệu sẽ đồng bộ (KHÔNG sync meofit_user)
const SYNC_KEYS=['meofit_profile','meofit_weightlog','meofit_fastlog','meofit_food','meofit_myfoods','meofit_history_v1','meofit_customsessions','meofit_if','meofit_plan','meofit_level','meofit_strength','meo:theme','meofit_snd','meofit_voice'];
// Log dạng mảng → gộp (union) theo khoá, không mất dữ liệu
const LOG_KEYS={meofit_weightlog:'ts',meofit_fastlog:'ts',meofit_food:'ts',meofit_history_v1:'ts',meofit_myfoods:'name',meofit_customsessions:'id'};
let _applyingCloud=false,_pushTimer=null;
// Bắt mọi lần ghi dữ liệu → tự đẩy lên cloud (debounce)
(function(){ const orig=localStorage.setItem.bind(localStorage);
  localStorage.setItem=function(k,v){ orig(k,v); if(!_applyingCloud && _fbStore.db && _fbAuth && _fbAuth.currentUser && SYNC_KEYS.indexOf(k)>=0) scheduleCloudPush(); };
})();
function scheduleCloudPush(){ clearTimeout(_pushTimer); _pushTimer=setTimeout(cloudPush,1600); }
function gatherLocal(){ const o={}; SYNC_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v!=null) o[k]=v; }); return o; }
function cloudPush(){ const u=_fbAuth&&_fbAuth.currentUser; if(!u||!_fbStore.db) return;
  const data=gatherLocal(); data.updatedAt=Date.now();
  _fbStore.db.collection('users').doc(u.uid).set(data,{merge:true})
    .then(()=>{ try{ localStorage.setItem('meofit_sync_ts',''+data.updatedAt); }catch(e){} })
    .catch(e=>console.warn('Đẩy tiến độ lỗi',e)); }
function mergeArr(localStr,cloudStr,idField){ let a=[],b=[];
  try{a=JSON.parse(localStr)||[]}catch(e){} try{b=JSON.parse(cloudStr)||[]}catch(e){}
  if(!Array.isArray(a))a=[]; if(!Array.isArray(b))b=[];
  const seen=new Set(),out=[];
  a.concat(b).forEach(it=>{ const key=(it&&idField&&it[idField]!=null)?String(it[idField]):JSON.stringify(it); if(seen.has(key))return; seen.add(key); out.push(it); });
  return JSON.stringify(out); }
function cloudSync(){ const u=_fbAuth&&_fbAuth.currentUser; if(!u||!_fbStore.db) return;
  _fbStore.db.collection('users').doc(u.uid).get().then(snap=>{
    const cloud=snap.exists?(snap.data()||{}):{};
    const localTs=parseInt(localStorage.getItem('meofit_sync_ts'))||0;
    const cloudNewer=(cloud.updatedAt||0)>localTs;
    _applyingCloud=true;
    try{ SYNC_KEYS.forEach(k=>{ const cv=cloud[k]; const cvStr=(cv==null)?null:(typeof cv==='string'?cv:JSON.stringify(cv));
      if(LOG_KEYS[k]){ localStorage.setItem(k, mergeArr(localStorage.getItem(k), cvStr||'[]', LOG_KEYS[k])); }
      else if(cloudNewer && cvStr!=null && cvStr!==''){ localStorage.setItem(k, cvStr); }
    }); }finally{ _applyingCloud=false; }
    try{ initTheme(); refreshCustomPlan(); }catch(e){}
    afterAuthRefresh();
    try{ const sv=document.querySelector('.view.show'); if(sv&&sv.id==='v-home') renderHome(); else if(sv&&sv.id==='v-prog') renderProgress(); }catch(e){}
    cloudPush(); // đẩy bản đã gộp lên
  }).catch(e=>console.warn('Kéo tiến độ lỗi',e)); }

function loadWeightLog(){ try{ return JSON.parse(localStorage.getItem('meofit_weightlog'))||[] }catch(e){ return [] } }
function saveWeightLog(a){ try{ localStorage.setItem('meofit_weightlog', JSON.stringify(a)); }catch(e){} }
function sparkline(pts){
  if(!pts.length) return '';
  const ws=pts.map(p=>p.weight), min=Math.min(...ws), max=Math.max(...ws), range=(max-min)||1;
  const W=300,H=92,pad=14,n=pts.length;
  const x=i=> n===1?W/2 : pad+i*(W-2*pad)/(n-1);
  const y=v=> H-pad-(v-min)/range*(H-2*pad);
  const line = n>1?`<polyline points="${pts.map((p,i)=>x(i).toFixed(1)+','+y(p.weight).toFixed(1)).join(' ')}" fill="none" stroke="#3fa34d" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:'';
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.weight).toFixed(1)}" r="3.2" fill="#2f7d3a"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="overflow:visible">${line}${dots}</svg>`;
}

function exMET(e){
  if(e.m==='Khởi động'||e.m==='Dãn cơ') return 2.5;
  if(e.m==='Cardio'||/Jump|Burpee|Climber|Jack/i.test(e.en)) return 8;
  if(e.type==='time'||/giữ/i.test(e.reps)) return 3.3;
  return 3.8;
}
function estKcal(sess,kg){
  let k=0; sess.ex.forEach(e=>{ const hrs=e.sets*((e.work||0)+(e.rest||0))/3600; k+=exMET(e)*kg*hrs; });
  return Math.round(k);
}
function getTargetKcal(){

  const fd=loadFood(); fd.push({date:todayStr(),ts:Date.now(),name:name||'Bữa ăn',kcal:Math.round(kcal),p:Math.round(+p||0),c:Math.round(+c||0),f:Math.round(+f||0),photo:photo||''});

function addQuick(name,kcal){ const g=macroGrams(kcal,[20,50,30]); addFood(name,kcal,g.p,g.c,g.f,''); }
function delFood(ts){ saveFood(loadFood().filter(e=>e.ts!==ts)); renderProgress(); }
function todayMacros(){ const t=todayStr(); return loadFood().filter(e=>e.date===t).reduce((s,e)=>({p:s.p+(e.p||0),c:s.c+(e.c||0),f:s.f+(e.f||0)}),{p:0,c:0,f:0}); }
function macroBar(lbl,cur,tot,col){ const pct=tot?Math.min(100,cur/tot*100):0; return `<div class="macro-row"><span class="ml">${lbl}</span><span class="macro-bar"><i style="width:${pct}%;background:${col}"></i></span><span class="mv">${cur}/${tot}g</span></div>`; }
// Tự nhập món: nhập kcal & macro theo 100g (đọc từ nhãn) + số gram → tính tổng; lưu "Món của tôi"
function addFoodManual(){
  const name=pv('food-name'), k100=+pv('food-kcal')||0, g=+pv('food-gram')||100;

  const p100=+pv('food-p')||0, c100=+pv('food-c')||0, f100=+pv('food-f')||0, sc=g/100;
  if(name){ const mf=loadMyFoods().filter(x=>x.name.toLowerCase()!==name.toLowerCase()); mf.unshift({name,base:k100,gram:true,p:p100,c:c100,f:f100}); saveMyFoods(mf.slice(0,40)); }
  let P=p100*sc,C=c100*sc,F=f100*sc;
  if(!p100&&!c100&&!f100){ const gg=macroGrams(k100*sc,[20,50,30]); P=gg.p;C=gg.c;F=gg.f; }

function renderFoodList(q){
  const el=document.getElementById('fp-list'), tb=document.getElementById('fp-tabs'), rb=document.getElementById('fp-regions'); if(!el) return;

  if(q){
    if(rb) rb.innerHTML=''; if(tb) tb.innerHTML='';

  // hàng VÙNG (theo quốc gia)
  const regs=FP_REGIONS.filter(([r])=>FOODS.some(c=>c.r===r));
  if(my.length) regs.push(['my','⭐ Của tôi']);
  if(!regs.some(([r])=>r===_fpReg)) _fpReg='vn';
  if(rb) rb.innerHTML=regs.map(([r,lb])=>`<button class="fp-reg ${r===_fpReg?'on':''}" onclick="fpReg('${r}')">${lb}</button>`).join('');
  // vùng "Của tôi"
  if(_fpReg==='my'){

  const ci=+_fpTab||0; const c=FOODS[ci]||(cats[0]&&cats[0][1])||FOODS[0];
  el.innerHTML=`<div class="fp-cat">${c.cat}</div>`+c.items.map(x=>bi(x[0],x[1],ci)).join('');
}

/* ============ NHỊN ĂN GIÁN ĐOẠN (Intermittent Fasting) ============ */
let _ifTimer=null;
function loadIF(){ try{ return JSON.parse(localStorage.getItem('meofit_if'))||{proto:16,start:null} }catch(e){ return {proto:16,start:null} } }
function saveIF(o){ try{ localStorage.setItem('meofit_if', JSON.stringify(o)); }catch(e){} }
function setIFProto(h){ const o=loadIF(); o.proto=h; saveIF(o); renderHome(); }
function startFast(){ const o=loadIF(); o.start=Date.now(); saveIF(o); renderHome(); }
function editFastStart(v){ if(!v) return; const o=loadIF(); if(!o.start) return; const [h,m]=v.split(':').map(Number); const d=new Date(); d.setHours(h,m,0,0); if(d.getTime()>Date.now()) d.setDate(d.getDate()-1); o.start=d.getTime(); saveIF(o); renderHome(); }
function editFastEnd(v){ if(!v) return; const o=loadIF(); if(!o.start) return; const [h,m]=v.split(':').map(Number); const d=new Date(); d.setHours(h,m,0,0); let st=d.getTime()-o.proto*3600000; if(st>Date.now()) st-=86400000; o.start=st; saveIF(o); renderHome(); }
function loadFastLog(){ try{ return JSON.parse(localStorage.getItem('meofit_fastlog'))||[] }catch(e){ return [] } }
function saveFastLog(a){ try{ localStorage.setItem('meofit_fastlog', JSON.stringify(a)); }catch(e){} }
function stopFast(){
  if(!confirm('Kết thúc nhịn ăn?')) return;
  const o=loadIF();
  if(o.start){ const hrs=(Date.now()-o.start)/3600000; const lg=loadFastLog(); lg.unshift({date:todayStr(),ts:Date.now(),hours:Math.round(hrs*10)/10,proto:o.proto,reached:hrs>=o.proto}); saveFastLog(lg.slice(0,120)); }
  o.start=null; saveIF(o); renderHome();
}
function delFastLog(ts){ saveFastLog(loadFastLog().filter(e=>e.ts!==ts)); renderProgress(); }
function fastReportHTML(){
  const lg=loadFastLog(), o=loadIF();
  const longest=lg.reduce((m,x)=>Math.max(m,x.hours||0),0);
  const wk=lg.filter(x=>x.ts>=Date.now()-7*864e5).length;
  const days=new Set(lg.filter(x=>x.reached).map(x=>x.date));
  let st=0,d=new Date(); if(!days.has(todayStr())) d.setDate(d.getDate()-1);
  for(;;){ const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); if(days.has(s)){st++;d.setDate(d.getDate()-1);} else break; }
  const rows=lg.slice(0,8).map(x=>{const dt=new Date(x.ts);return `<div class="hist-item"><div class="e">${x.reached?'✅':'⏳'}</div><div class="d"><div class="n">Nhịn ${x.hours}h${x.reached?` · đạt ${x.proto}h 🎉`:` / ${x.proto}h`}</div><div class="t">${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}</div></div><button class="hist-del" onclick="delFastLog(${x.ts})" title="Xoá">✕</button></div>`;}).join('');
  return `<div class="card">
    <h2 class="sec-title" style="margin:0 0 10px">⏳ Nhịn ăn gián đoạn</h2>
    ${o.start?`<div class="note-box rope" style="margin:0 0 10px">⏱️ Đang nhịn ăn — xem đồng hồ ở tab 🏠 Hôm nay</div>`:''}
    <div class="stats">
      <div class="stat"><div class="num" style="font-size:1.25rem">🔥 ${st}</div><div class="lbl">Chuỗi ngày</div></div>
      <div class="stat"><div class="num" style="font-size:1.25rem">📆 ${wk}</div><div class="lbl">Tuần này</div></div>
      <div class="stat"><div class="num" style="font-size:1.25rem">🏆 ${longest?longest.toFixed(1):0}h</div><div class="lbl">Dài nhất</div></div></div>
    ${lg.length?`<div style="margin-top:10px">${rows}</div>`:'<div class="empty" style="padding:10px">Chưa có buổi nhịn nào — bắt đầu ở tab Hôm nay 🐾</div>'}
  </div>`;
}
function fmtRem(hf){ const h=Math.floor(hf), m=Math.floor((hf-h)*60); return `${h}h${m>0?' '+m+'m':''}`; }
function hhmm(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
const IF_PHASES=[{to:4,n:'Tiêu hoá',e:'🍽️'},{to:8,n:'Hạ đường huyết',e:'📉'},{to:12,n:'Cạn glycogen',e:'⚡'},{to:16,n:'Đốt mỡ',e:'🔥'},{to:99,n:'Tự thực bào',e:'✨'}];

      <div style="text-align:center;font-size:.76rem;color:var(--muted);font-weight:700;margin-top:12px">Bấm “Bắt đầu nhịn ăn” để Mèo đếm giờ & tính sẵn giờ được ăn 🐾</div>`;
  }
  const Fms=proto*3600000, eMs=Date.now()-o.start, prog=Math.min(100,eMs/Fms*100), done=eMs>=Fms, remMs=Fms-eMs;
  const elapsedH=eMs/3600000, phIdx=Math.min(IF_PHASES.length-1, Math.max(0, IF_PHASES.findIndex(p=>elapsedH<p.to)));
  const ph=IF_PHASES[phIdx];
  const ring=`<div class="if-ring" style="background:conic-gradient(${done?'#3fa34d':'#7bd389'} ${prog.toFixed(1)}%, var(--surface-2) 0)">
      <div class="if-ring-in"><div style="font-size:1.5rem;line-height:1">${done?'🎉':ph.e}</div><div style="font-size:1.35rem;font-weight:800;color:var(--green-d);line-height:1.1">${fmtMs(eMs)}</div><div style="font-size:.6rem;color:var(--muted);font-weight:800;margin-top:1px">/ ${proto}h · ${done?'đủ giờ!':ph.n}</div></div>
    </div>
    <div style="text-align:center;font-weight:800;margin-top:10px;color:${done?'var(--green-d)':'var(--ink)'}">${done?'🎉 Đủ giờ nhịn — tới giờ ăn!':`⏳ Còn ${fmtMs(remMs)} đến giờ ăn`}</div>`;
  const pills=`<div class="if-times">
      <div class="if-pill"><span>🌙 Bắt đầu</span><input type="time" class="if-tin" value="${hhmm(o.start)}" onchange="editFastStart(this.value)"></div>
      <div class="if-pill if-pill--eat"><span>🍽️ Được ăn</span><input type="time" class="if-tin" value="${hhmm(o.start+Fms)}" onchange="editFastEnd(this.value)"></div>
      <div class="if-pill"><span>⏳ Còn lại</span><b>${done?'0h 00m':fmtMs(remMs)}</b></div>
    </div>
    <div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:6px">Bấm vào giờ để chỉnh lại nếu quên bấm 🐾</div>`;
  const strip=`<div class="if-phases">${IF_PHASES.map((p,i)=>`<div class="if-ph ${i===phIdx?'on':''}">${p.e}<small>${p.n}</small></div>`).join('')}</div>`;
  return ring+pills+strip;
}

/* ============ AUDIO + HUẤN LUYỆN VIÊN GIỌNG NÓI ============ */
let actx=null;
let SND=true, VOICE=true;
function loadAudioPrefs(){ try{ SND=localStorage.getItem('meofit_snd')!=='0'; VOICE=localStorage.getItem('meofit_voice')!=='0'; }catch(e){} }
function initAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(actx && actx.state==='suspended'){ try{ actx.resume(); }catch(e){} }
}
function beep(freq=880,dur=.15,vol=.25){ if(!SND||!actx) return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime); g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.start(); o.stop(actx.currentTime+dur);
}
function beepGo(){ beep(660,.12); setTimeout(()=>beep(900,.2),130); }          // vào hiệp — đi LÊN
function beepTick(){ beep(760,.07,.16); }                                       // đếm
function beepRest(){ beep(500,.16,.22); setTimeout(()=>beep(360,.26,.22),160); }// vào NGHỈ — đi XUỐNG (khác hẳn)
function beepReady(){ beep(880,.09,.2); }                                       // sắp hết nghỉ
function beepDoneSet(){ beep(620,.1); setTimeout(()=>beep(780,.1),110); setTimeout(()=>beep(990,.18),230); } // xong 1 hiệp
function vibrate(ms){ if(navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

/* giọng nói */
let _voice=null, _vlang='vi';
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs=speechSynthesis.getVoices(); if(!vs.length) return;
  const vi=vs.find(v=>/^vi/i.test(v.lang));
  if(vi){ _voice=vi; _vlang='vi'; } else { _voice=vs.find(v=>/^en/i.test(v.lang))||vs[0]; _vlang=_voice?(/^vi/i.test(_voice.lang)?'vi':'en'):'en'; }
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
const PHRASES={ vi:{hold:'giữ',rest:'nghỉ',ready:'sẵn sàng',go:'bắt đầu',done:'tốt lắm',half:'cố lên'},
                en:{hold:'hold',rest:'rest',ready:'ready',go:'go',done:'great job',half:'keep going'} };
function ph(k){ return (PHRASES[_vlang]||PHRASES.en)[k]; }
function say(text){
  if(!VOICE || !('speechSynthesis' in window) || !text) return;
  try{ const u=new SpeechSynthesisUtterance(text); if(_voice){ u.voice=_voice; u.lang=_voice.lang; } u.rate=1.08; u.pitch=1.12; speechSynthesis.speak(u); }catch(e){}
}
function sayNum(n){ say(String(n)); }
function shutUp(){ if('speechSynthesis' in window) try{ speechSynthesis.cancel(); }catch(e){} }

function updateAudioBtns(){
  const s=document.getElementById('sndBtn'), v=document.getElementById('voiceBtn');
  if(s){ s.textContent=SND?'🔊':'🔇'; s.classList.toggle('off',!SND); }
  if(v){ v.textContent=VOICE?'🗣️':'🤫'; v.classList.toggle('off',!VOICE); }
}
function toggleSnd(){ SND=!SND; try{localStorage.setItem('meofit_snd',SND?'1':'0')}catch(e){} if(SND) initAudio(); updateAudioBtns(); }
function toggleVoice(){ VOICE=!VOICE; try{localStorage.setItem('meofit_voice',VOICE?'1':'0')}catch(e){} if(!VOICE) shutUp(); updateAudioBtns(); }

/* ============ WORKOUT PLAYER ============ */
const P={sess:null,exIdx:0,setIdx:0,timer:null,remain:0,total:0,paused:false,onEnd:null,redraw:null,repN:0,spoken:0};
const RING_R=100, RING_C=2*Math.PI*RING_R;

function repCount(e){
  if(e.type!=='reps') return 0;
  const m=String(e.reps).match(/(\d+)(?:\s*[–-]\s*(\d+))?/);
  return m?parseInt(m[2]||m[1]):0;
}
function startWorkout(id){
  initAudio(); loadAudioPrefs(); updateAudioBtns();
  if(VOICE) say(ph('ready')); // mở khoá giọng nói bằng cú chạm
  P.sess=sessById(id); P.exIdx=0; P.setIdx=0; P.paused=false;
  document.getElementById('p-session').textContent=P.sess.icon+' '+P.sess.name+' · '+LEVELS[getLevel()].name;
  document.getElementById('player').classList.add('show');

}
function closePlayer(){ clearInterval(P.timer); P.timer=null; P.paused=false; shutUp(); document.getElementById('player').classList.remove('show'); }
document.getElementById('p-close').onclick=()=>{ if(confirm('Thoát buổi tập? Tiến độ buổi này sẽ không được lưu.')) closePlayer(); };

function updateBar(){
  const ex=P.sess.ex; let tot=0,done=0;
  ex.forEach((e,i)=>{ tot+=e.sets; if(i<P.exIdx) done+=e.sets; else if(i===P.exIdx) done+=P.setIdx; });
  document.getElementById('pbar-fill').style.width=(done/tot*100)+'%';
}
function nextName(){
  const ex=P.sess.ex;
  if(P.setIdx<ex[P.exIdx].sets-1) return 'Hiệp '+(P.setIdx+2)+' • '+ex[P.exIdx].n;
  if(P.exIdx<ex.length-1) return 'Tiếp: '+ex[P.exIdx+1].mi+' '+ex[P.exIdx+1].n;
  return 'Bài cuối cùng 🎉';
}
function ringSVG(p,color){
  const off=RING_C*(1-p);
  return `<svg width="230" height="230" viewBox="0 0 230 230">
    <circle cx="115" cy="115" r="${RING_R}" fill="none" stroke="rgba(127,160,127,.28)" stroke-width="16"/>
    <circle cx="115" cy="115" r="${RING_R}" fill="none" stroke="${color}" stroke-width="16" stroke-linecap="round" stroke-dasharray="${RING_C}" stroke-dashoffset="${off}"/></svg>`;
}
function header(e){
  return `<div class="phase-lbl" id="phase-lbl"></div>
    <div class="ex-name">${e.mi} ${e.n}</div>
    <div class="ex-tag"><span class="tag" style="background:${tagColor(e.m)}">${e.m}</span></div>`;
}
function pBtn(){ return `<button class="btn" style="background:linear-gradient(135deg,#ffa94d,#f0871f)" onclick="togglePause()">${P.paused?'▶️ Tiếp tục':'⏸ Tạm dừng'}</button>`; }

// đồng hồ đếm ngược có hỗ trợ Tạm dừng
function runCountdown(total, tick, end){
  clearInterval(P.timer); P.remain=total; P.total=total; P.onEnd=end;
  tick();
  P.timer=setInterval(()=>{
    if(P.paused) return;
    P.remain--;
    if(P.remain<=0){ P.remain=0; clearInterval(P.timer); P.timer=null; tick(); const f=P.onEnd; P.onEnd=null; if(f) f(); return; }
    tick();
  },1000);
}
function togglePause(){
  if(!P.timer) return;
  P.paused=!P.paused;
  if(P.paused) shutUp();
  if(P.redraw) P.redraw();
}

// Thẻ hướng dẫn ngay trong buổi tập — tự tạm dừng, link mở tab mới (không mất tiến trình)

function enterExercise(){ P.setIdx=0; updateBar(); enterSet(); }
function enterSet(){ clearInterval(P.timer); P.timer=null; P.paused=false; updateBar(); startPrep(()=>startWork()); }

function startPrep(then){
  const e=P.sess.ex[P.exIdx];
  if(VOICE) say(ph('ready'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      ${header(e)}
      <div class="ring">${ringSVG(P.remain/3,'var(--yellow)')}<div class="num"><div class="big">${P.remain||'🐾'}</div><div class="small">Sẵn sàng…</div></div></div>
      <div class="setinfo">Hiệp ${P.setIdx+1}/${e.sets}</div>
      <div class="target">🎯 ${e.reps}${e.perSide?' (cả 2 bên)':''}</div>
      <div class="tempo">💡 ${e.tempo}</div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="skipExercise()">⏭ Bỏ bài</button></div>`;
    document.getElementById('phase-lbl').textContent=P.paused?'⏸ Tạm dừng':'Chuẩn bị';
  };
  P.redraw=draw;
  runCountdown(3, ()=>{ if(P.remain>0){ beepTick(); sayNum(P.remain); } draw(); }, then);
}

function startWork(){
  const e=P.sess.ex[P.exIdx], total=e.work; P.repN=repCount(e); P.spoken=0;
  beepGo(); vibrate(120);
  if(P.repN===0) say(/giữ/i.test(e.reps)?ph('hold'):ph('go'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      ${header(e)}
      <div class="ring">${ringSVG(P.remain/total,tagColor(e.m))}<div class="num"><div class="big">${P.remain}</div><div class="small">giây</div></div></div>
      <div class="setinfo">Hiệp ${P.setIdx+1}/${e.sets}${P.repN?` · đếm ${P.spoken}/${P.repN}`:''}</div>
      <div class="target">🎯 ${e.reps}${e.perSide?' (cả 2 bên)':''}</div>
      <div class="tempo">💡 ${e.tempo}</div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="finishSet()">✓ Xong sớm</button></div>
      <div class="controls"><button class="btn sec" onclick="skipExercise()">⏭ Bỏ bài</button></div>`;
    document.getElementById('phase-lbl').textContent=P.paused?'⏸ Tạm dừng':'Thực hiện';
  };
  P.redraw=draw;
  runCountdown(total, ()=>{
    if(P.repN>0){
      const elapsed=total-P.remain, pace=total/P.repN;
      const no=Math.min(P.repN, Math.floor(elapsed/pace)+1);
      if(no>P.spoken){ P.spoken=no; sayNum(no); beepTick(); }
    } else if(P.remain<=3 && P.remain>0){ beepTick(); sayNum(P.remain); }
    draw();
  }, ()=>{ vibrate([120,80,120]); finishSet(); });
}

function finishSet(){
  clearInterval(P.timer); P.timer=null; P.paused=false;
  const e=P.sess.ex[P.exIdx];
  if(P.setIdx<e.sets-1){ beepDoneSet(); startRest(e.rest||30, ()=>{ P.setIdx++; enterSet(); }); }
  else { say(ph('done')); nextExercise(); }
}
function startRest(sec,then){
  beepRest(); say(ph('rest'));
  const draw=()=>{
    document.getElementById('p-center').innerHTML=`
      <div class="phase-lbl" style="color:var(--blue)">${P.paused?'⏸ Tạm dừng':'Nghỉ giữa hiệp'}</div>
      <div class="ex-name" style="color:var(--blue)">😮‍💨 Hít thở sâu</div><div class="ex-tag"></div>
      <div class="ring">${ringSVG(P.remain/sec,'var(--blue)')}<div class="num"><div class="big" style="color:var(--blue)">${P.remain}</div><div class="small">giây nghỉ</div></div></div>
      <div class="nextup">${nextName()}</div>
      <div class="controls">${pBtn()}<button class="btn sec" onclick="skipRest()">⏭ Bỏ nghỉ</button></div>`;
  };
  P.redraw=draw;
  runCountdown(sec, ()=>{ if(P.remain<=3 && P.remain>0){ beepReady(); sayNum(P.remain); } draw(); },
    ()=>{ beepGo(); vibrate(100); then(); });
}
function skipRest(){ if(!P.onEnd) return; clearInterval(P.timer); P.timer=null; P.paused=false; const f=P.onEnd; P.onEnd=null; f(); }
function skipExercise(){ clearInterval(P.timer); P.timer=null; P.paused=false; P.onEnd=null; shutUp(); nextExercise(); }
function nextExercise(){ if(P.exIdx<P.sess.ex.length-1){ P.exIdx++; enterExercise(); } else finishWorkout(); }

function finishWorkout(){
  clearInterval(P.timer); P.timer=null; P.paused=false;
  logDone(P.sess.id, getLevel(), estKcal(P.sess, (loadProfile().weight)||60));

        <div style="padding:8px 12px 12px"><div style="font-size:.74rem;color:var(--muted);margin-bottom:8px">Ghi mức tạ (kg) & số lần thực tế. Bài tay không cứ để trống ô kg 🐾</div>
        ${exs.map((e,i)=>`<div class="slog-row"><span class="slog-n">${e.mi} ${e.n}</span>
          <input id="slog-${i}-kg" class="slog-in" type="number" inputmode="decimal" placeholder="kg">
          <input id="slog-${i}-reps" class="slog-in" type="number" inputmode="numeric" placeholder="lần" value="${parseInt(e.reps)||''}"></div>`).join('')}
        <button class="btn" onclick="saveStrengthSession()" style="margin-top:8px">💾 Lưu thành tích</button></div></details>`:''})()}</div>
      <div class="controls"><button class="btn" onclick="closePlayer();go('prog')">📊 Xem tiến độ</button></div>
      <div class="controls"><button class="btn sec" onclick="closePlayer();go('home')">🏠 Về trang chủ</button></div>
    </div>`;
}

/* ============ MASCOT: 🐾 Mèo Lực Sĩ (ảnh AI) ============ */
// Lấp lánh động quanh mèo (vị trí % cố định, lệch pha)
function mfSparkles(){
  const s=[[6,10,14,0],[84,6,17,.5],[70,26,11,1.1],[10,52,10,.8],[90,50,13,1.4],[44,-6,12,.3],[30,80,9,1.7]];
  return s.map(([l,t,sz,d])=>`<span class="spk" style="left:${l}%;top:${t}%;width:${sz}px;height:${sz}px;animation-delay:${d}s"></span>`).join('');
}
// Mèo bánh bao + lấp lánh (lấp đầy khung cha)
function mfBun(sparkle){
  return `<span class="mfx" style="width:100%;height:100%"><img src="mascot_sq.png" alt="Mèo Lực Sĩ">${sparkle!==false?mfSparkles():''}</span>`;
}
// Logo mặt mèo nền xanh (header) — đồng bộ icon app, kèm lấp lánh
function mfLogo(){
  return `<span class="mfx" style="width:100%;height:100%;border-radius:24%;overflow:visible">`
    +`<img src="logo.png" alt="MèoFit" style="border-radius:24%">${mfSparkles()}</span>`;
}
// Mèo nâng tạ — animation 4 frame (sprite 1104x320, frame 276)
function mfLift(h){
  h=h||96; const sc=h/320, fw=Math.round(291*sc), sw=fw*4;
  return `<div class="mf-lift" style="width:${fw}px;height:${h}px;background-size:${sw}px ${h}px;--liftw:-${sw}px"></div>`;
}

/* ============ THEME (đồng bộ Meomoe: light / dark / sakura, khoá meo:theme) ============ */
const THEMES=['light','dark','sakura'];
const THEME_ICON={light:'☀️',dark:'🌙',sakura:'🌸'};
function applyTheme(t){
  if(!THEMES.includes(t)) t='light';
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('meo:theme', t); }catch(e){}
  const b=document.getElementById('themeBtn'); if(b) b.textContent=THEME_ICON[t];
}
function initTheme(){ let t='light'; try{ t=localStorage.getItem('meo:theme')||'light'; }catch(e){} applyTheme(t); }
function cycleTheme(){ let t='light'; try{ t=localStorage.getItem('meo:theme')||'light'; }catch(e){} applyTheme(THEMES[(THEMES.indexOf(t)+1)%THEMES.length]); }

/* ============ INIT ============ */
(function(){
  initTheme();
  loadAudioPrefs(); updateAudioBtns();
  const tb=document.getElementById('themeBtn'); if(tb) tb.onclick=cycleTheme;
  document.getElementById('mascot').innerHTML = mfLogo();
  // hoa lá rơi
  const f=document.getElementById('flowers'), em=['🌸','🌼','🌷','🌺','🌻','💐','🏵️','🌹','💮','🪷','🌈','💖','🍀','⭐'];
  for(let i=0;i<22;i++){ const s=document.createElement('span'); s.textContent=em[Math.floor(Math.random()*em.length)];
    s.style.left=(Math.random()*96)+'%'; s.style.top=(Math.random()*94)+'%';
    s.style.fontSize=(13+Math.random()*18)+'px'; s.style.animationDelay=(Math.random()*9)+'s';
    s.style.animationDuration=(7+Math.random()*6)+'s'; f.appendChild(s); }
  // bung hoa nhỏ khi bấm chuột
  const BURST=['🌸','🌼','🌷','🌺','💮','🪷','💕','⭐','🌈','💖'];
  window.addEventListener('click', e=>{
    for(let i=0;i<7;i++){ const s=document.createElement('span'); s.className='burst'; s.textContent=BURST[Math.floor(Math.random()*BURST.length)];
      const ang=Math.random()*Math.PI*2, dist=24+Math.random()*36;
      s.style.left=e.clientX+'px'; s.style.top=e.clientY+'px';
      s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
      s.style.setProperty('--dy',(Math.sin(ang)*dist).toFixed(0)+'px');
      s.style.fontSize=(11+Math.random()*10)+'px';
      document.body.appendChild(s); setTimeout(()=>s.remove(),760); }
  }, {passive:true});
  // ✨ lấp lánh theo con trỏ (cục tạ hồng)
  const trail=document.getElementById('trail'); let last=0; const SPK=['✨','💫','⭐','🌟','💖'];
  window.addEventListener('mousemove', e=>{
    const now=e.timeStamp||performance.now(); if(now-last<55) return; last=now;
    const p=document.createElement('span'); p.className='paw'; p.textContent=SPK[Math.floor(Math.random()*SPK.length)];
    p.style.left=(e.clientX+(Math.random()*14-7))+'px'; p.style.top=(e.clientY+(Math.random()*14-7))+'px';
    p.style.fontSize=(9+Math.random()*8)+'px';
    p.style.setProperty('--r',(Math.random()*60-30)+'deg');
    trail.appendChild(p); setTimeout(()=>p.remove(),800);
  }, {passive:true});
})();
refreshCustomPlan();
if(curPlanId()==='custom' && !PLANS.custom.sessions.length){ try{ localStorage.setItem('meofit_plan','home'); }catch(e){} }
initFirebase(); // khôi phục phiên đăng nhập nếu có
renderHome();
try{ const _t=location.hash.slice(1); if(_t && document.getElementById('v-'+_t)) go(_t); }catch(e){}

/* PWA — chạy offline (đăng ký service worker theo đường dẫn tương đối) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

/* Nút "Cài app" — Android/Chrome dùng beforeinstallprompt; iOS hiện hướng dẫn */
(function(){
  const btn=document.getElementById('installBtn'); if(!btn) return;
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(standalone) return; // đã cài rồi thì ẩn
  let deferred=null;
  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; btn.textContent='📲 Cài MèoFit'; btn.classList.add('show'); });
  window.addEventListener('appinstalled', ()=>{ btn.classList.remove('show'); deferred=null; });
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS){ btn.classList.add('show'); }
  btn.onclick=async ()=>{
    if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; btn.classList.remove('show'); }
    else { alert('Cài MèoFit vào màn hình chính 🐾\n\niPhone: bấm nút Chia sẻ ⎙ ở thanh Safari → "Thêm vào MH chính".\nAndroid: menu ⋮ → "Cài đặt ứng dụng / Thêm vào MH chính".'); }
  };
})();
